function printOrShare(html, filename){
  const win = window.open('','_blank');
  if(!win){alert('Allow popups to print/view document.');return;}
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(()=>win.print(), 500);
}

// ── INVOICE MODAL ──────────────────────────────────────────────
function InvoiceModal({sale, customers, stores, session, onClose}){
  const [type, setType] = useState('receipt');
  const sym = getSym(session.currency);
  const customer = customers.find(c=>c.id===sale.customerId)||null;
  const store = stores.find(s=>s.id===sale.storeId)||null;
  const html = generateInvoiceHTML(sale, customer, store, sym, type);

  function share(){
    const text = `🧾 ${type==='invoice'?'Invoice':'Receipt'} from ${store?.name||'StorePOS'}\n` +
      `Amount: ${sym}${sale.total?.toFixed(2)}\n` +
      `Date: ${new Date(sale.createdAt||Date.now()).toLocaleDateString()}\n` +
      `Ref: #${sale.id?.slice(-8).toUpperCase()}\n` +
      `Items: ${sale.items?.map(i=>`${i.name} x${i.qty}`).join(', ')}`;
    if(navigator.share) navigator.share({title:'StorePOS Document', text});
    else navigator.clipboard.writeText(text).then(()=>alert('Copied to clipboard!'));
  }

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" style={{maxWidth:540}} onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <span style={{fontWeight:700}}>📄 Document</span>
          <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18}} onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            {[['receipt','🧾 Receipt'],['invoice','📋 Invoice']].map(([t,l])=>(
              <button key={t} onClick={()=>setType(t)} style={{flex:1,padding:'10px',border:`2px solid ${type===t?'var(--accent)':'var(--border)'}`,borderRadius:8,background:type===t?'#f9731618':'var(--bg)',color:type===t?'var(--accent)':'var(--text2)',fontFamily:'var(--fm)',fontWeight:700,cursor:'pointer',fontSize:13}}>{l}</button>
            ))}
          </div>
          <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:16,marginBottom:16}}>
            <div style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>Preview</div>
            <div style={{fontSize:13,color:'var(--text2)'}}>
              <div style={{fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:4}}>{type==='invoice'?'INVOICE':'RECEIPT'} #{sale.id?.slice(-8).toUpperCase()}</div>
              <div>Customer: <strong>{customer?.name||sale.customer||'Walk-in'}</strong></div>

              <div>Payment: {sale.payMethod||'Cash'}</div>
            </div>
          </div>
          <div className="notice notice-blue" style={{fontSize:11}}>
            Clicking Print will open the full formatted {type} in a new window ready to print or save as PDF. Use Share to send via WhatsApp or SMS.
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn-outline" onClick={share}>📤 Share</button>
          <button className="btn" onClick={()=>printOrShare(html, `${type}-${sale.id?.slice(-8)}`)}>🖨️ Print / PDF</button>
        </div>
      </div>
    </div>
  );
}

function buildReminderMsg(customer, product, store, daysOverdue){
  const greeting = `Hello ${customer.name}!`;
  const overdue = daysOverdue > 0;
  return `${greeting}\n\nThis is a reminder from ${store?.name||'our store'}.\n\n` +
    `${overdue ? `Your ${product.name} service is ${daysOverdue} day(s) overdue.` : `Your ${product.name} is due for replacement/service soon.`}\n\n` +
    `Based on your vehicle${customer.vehicle?` (${customer.vehicle})`:''}, we recommend changing your ${product.name} every ${product.reminderDays} days.\n\n` +
    `📞 Call us: ${store?.phone||''}\n` +
    `📍 ${store?.location||'Visit our store'}\n\n` +
    `Reply to this message to book an appointment.\nThank you! 🙏`;
}

// ── CUSTOMERS VIEW ─────────────────────────────────────────────
function VCustomers({customers, setCustomers, sales, stores, session, activeStore, setView}){
  const [modal, setModal] = useState(null);
  const [search, setSearch] = useState('');
  const [tab, setTab] = useState('all');
  const sym = getSym(session.currency);

  function save(d){
    setCustomers(cc=>d.id?cc.map(c=>c.id===d.id?d:c):[...cc,{...d,id:uid(),storeId:activeStore,createdAt:Date.now()}]);
    setModal(null);
  }
  function del(id){if(!confirm('Delete customer?'))return;setCustomers(cc=>cc.filter(c=>c.id!==id));}

  const storeCusts = customers.filter(c=>c.storeId===activeStore);
  const dueCusts = storeCusts.filter(c=>{
    const reminders = c.reminders||[];
    return reminders.some(r=>isDue(r.nextDate)||isOverdue(r.nextDate));
  });

  const list = (tab==='due'?dueCusts:storeCusts).filter(c=>
    !search || c.name?.toLowerCase().includes(search.toLowerCase()) ||
    c.phone?.includes(search) || c.vehicle?.toLowerCase().includes(search.toLowerCase())
  );

  function getCustSales(custId){return sales.filter(s=>s.customerId===custId);}
  function getCustTotal(custId){return getCustSales(custId).reduce((t,s)=>t+s.total,0);}

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,gap:8}}>

          🔔 Due ({dueCusts.length})
        </button>
      </div>

      <div className="search-wrap">
        <span className="search-ico">🔍</span>
        <input className="inp search-inp" placeholder="Search name, phone, vehicle…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {list.length===0&&<div className="card empty-state"><div className="empty-ico">👥</div><div style={{fontSize:13,letterSpacing:2}}>NO CUSTOMERS YET</div><div style={{fontSize:12,marginTop:8,color:'var(--text3)'}}>Add customers to track purchases and send reminders</div></div>}

      {list.map(c=>{
        const custSales = getCustSales(c.id);
        const total = getCustTotal(c.id);
        const reminders = c.reminders||[];

        return(
          <div key={c.id} className="card" style={{marginBottom:10,border:dueReminders.length>0?'1px solid #f59e0b44':'1px solid var(--border)'}}>

              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                  <span style={{fontWeight:800,fontSize:15}}>👤 {c.name}</span>
                  {dueReminders.length>0&&<span className="tag tag-amber">🔔 {dueReminders.length} DUE</span>}
                </div>
                {c.phone&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:1}}>📞 {c.phone}</div>}
                {c.email&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:1}}>✉️ {c.email}</div>}
                {c.vehicle&&<div style={{fontSize:12,color:'var(--accent)',marginBottom:1}}>🚗 {c.vehicle} {c.vehicleType?`(${c.vehicleType})`:''} {c.plateNumber?`| ${c.plateNumber}`:''}</div>}

                  <span>🧾 {custSales.length} purchases</span>
                  <span style={{color:'var(--accent)',fontFamily:'var(--fd)',fontWeight:700}}>{fmtMoney(total,sym)}</span>
                </div>
              </div>
              <div style={{display:'flex',gap:5,flexDirection:'column',alignItems:'flex-end'}}>
                <button className="btn-sm" onClick={()=>setModal({data:c})}>Edit</button>
                <button className="btn-danger" style={{fontSize:9}} onClick={()=>del(c.id)}>Del</button>

            {/* Due reminders */}
            {dueReminders.length>0&&(
              <div style={{background:'#f59e0b11',border:'1px solid #f59e0b33',borderRadius:8,padding:10,marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--amber)',letterSpacing:1,marginBottom:6}}>🔔 REMINDERS DUE</div>
                {dueReminders.map((r,i)=>{
                  const daysOver = Math.ceil((new Date()-new Date(r.nextDate))/86400000);
                  const msg = buildReminderMsg(c, r, store, Math.max(0,daysOver));
                  const wa = `https://wa.me/${c.phone?.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
                  return(
                    <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,flexWrap:'wrap',gap:6}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:700}}>{r.name}</div>
                        <div style={{fontSize:10,color:isOverdue(r.nextDate)?'var(--red)':'var(--amber)'}}>{fmtDaysFromNow(r.nextDate)}</div>
                      </div>
                      <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                        {c.phone&&<a href={wa} target="_blank" rel="noreferrer" style={{padding:'5px 10px',background:'#22c55e22',border:'1px solid #22c55e44',borderRadius:5,color:'var(--green)',fontSize:10,fontWeight:700,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:4}}>💬 WhatsApp</a>}
                        {c.phone&&<a href={`tel:${c.phone}`} style={{padding:'5px 10px',background:'#6366f122',border:'1px solid #6366f144',borderRadius:5,color:'var(--blue)',fontSize:10,fontWeight:700,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:4}}>📞 Call</a>}
                        <button onClick={()=>{navigator.clipboard.writeText(msg).then(()=>alert('Message copied!'));}} style={{padding:'5px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text2)',fontSize:10,cursor:'pointer',fontFamily:'var(--fm)',fontWeight:700}}>📋 Copy</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* All reminders */}
            {reminders.filter(r=>!isDue(r.nextDate)&&!isOverdue(r.nextDate)).length>0&&(
              <div style={{borderTop:'1px solid var(--border2)',paddingTop:8}}>
                {reminders.filter(r=>!isDue(r.nextDate)&&!isOverdue(r.nextDate)).map((r,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'3px 0',color:'var(--text3)'}}>
                    <span>🔔 {r.name}</span>
                    <span style={{color:'var(--green)'}}>{fmtDaysFromNow(r.nextDate)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
      {modal&&<CustomerModal data={modal.data} onSave={save} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ── CUSTOMER MODAL ─────────────────────────────────────────────
function CustomerModal({data, onSave, onClose}){
  const [f, setF] = useState(data||{name:'',phone:'',email:'',address:'',vehicle:'',vehicleType:'',plateNumber:'',notes:'',reminders:[]});
  const [reminderForm, setReminderForm] = useState({name:'',days:14});
  const sv = (k,v)=>setF(p=>({...p,[k]:v}));

  function addReminder(){
    if(!reminderForm.name.trim())return;
    const nextDate = new Date();
    nextDate.setDate(nextDate.getDate()+parseInt(reminderForm.days));
    const r = {name:reminderForm.name,days:parseInt(reminderForm.days),nextDate:nextDate.toISOString().slice(0,10)};
    setF(p=>({...p,reminders:[...(p.reminders||[]),r]}));
    setReminderForm({name:'',days:14});
  }
  function removeReminder(i){setF(p=>({...p,reminders:p.reminders.filter((_,idx)=>idx!==i)}));}
  function snoozeReminder(i,days){
    setF(p=>{
      const rs=[...(p.reminders||[])];
      const next=new Date();next.setDate(next.getDate()+days);
      rs[i]={...rs[i],nextDate:next.toISOString().slice(0,10)};
      return{...p,reminders:rs};
    });
  }

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr"><span style={{fontWeight:700}}>{data?'Edit':'Add'} Customer</span>
          <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18}} onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div style={{fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:12,fontWeight:700}}>PERSONAL INFO</div>
          <div className="field"><label className="lbl">Full Name *</label><input className="inp" value={f.name} onChange={e=>sv('name',e.target.value)} placeholder="Customer name"/></div>
          <div className="form-grid">
            <div className="field"><label className="lbl">Phone</label><input className="inp" value={f.phone||''} onChange={e=>sv('phone',e.target.value)} placeholder="0244000000" type="tel"/></div>
            <div className="field"><label className="lbl">Email</label><input className="inp" value={f.email||''} onChange={e=>sv('email',e.target.value)} placeholder="email@example.com" type="email"/></div>
          </div>
          <div className="field"><label className="lbl">Address</label><input className="inp" value={f.address||''} onChange={e=>sv('address',e.target.value)} placeholder="Home or work address"/></div>

          <div style={{fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:12,marginTop:4,fontWeight:700}}>VEHICLE INFO (Optional)</div>
          <div className="form-grid">
            <div className="field"><label className="lbl">Vehicle / Model</label><input className="inp" value={f.vehicle||''} onChange={e=>sv('vehicle',e.target.value)} placeholder="e.g. Toyota Corolla"/></div>
            <div className="field"><label className="lbl">Type</label>
              <select className="sel" value={f.vehicleType||''} onChange={e=>sv('vehicleType',e.target.value)}>
                <option value="">Select…</option>
                {VEHICLE_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
          </div>
          <div className="field"><label className="lbl">Plate Number</label><input className="inp" value={f.plateNumber||''} onChange={e=>sv('plateNumber',e.target.value.toUpperCase())} placeholder="GR-1234-22"/></div>

          <div style={{fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:12,marginTop:4,fontWeight:700}}>🔔 PRODUCT REMINDERS</div>
          <div className="notice notice-blue" style={{fontSize:11,marginBottom:12}}>Set reminders for products this customer needs regularly (e.g. Engine Oil every 14 days)</div>

          {(f.reminders||[]).map((r,i)=>(
            <div key={i} style={{display:'flex',gap:8,alignItems:'center',background:'var(--bg3)',borderRadius:8,padding:10,marginBottom:8,flexWrap:'wrap'}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13}}>{r.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>Every {r.days} days · Next: {fmtDate(r.nextDate)}</div>
              </div>
              <div style={{display:'flex',gap:5}}>
                <button onClick={()=>snoozeReminder(i,r.days)} style={{padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,color:'var(--amber)',fontSize:10,cursor:'pointer',fontFamily:'var(--fm)'}}>Reset</button>
                <button onClick={()=>removeReminder(i)} style={{padding:'4px 8px',background:'none',border:'1px solid #ef444444',borderRadius:5,color:'var(--red)',fontSize:10,cursor:'pointer',fontFamily:'var(--fm)'}}>✕</button>
              </div>
            </div>
          ))}

          <div style={{background:'var(--bg)',border:'1px dashed var(--border)',borderRadius:8,padding:12,marginBottom:12}}>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:8,fontWeight:700}}>+ Add Reminder</div>
            <div className="form-grid" style={{marginBottom:8}}>
              <input className="inp" value={reminderForm.name} onChange={e=>setReminderForm(p=>({...p,name:e.target.value}))} placeholder="Product (e.g. Engine Oil)"/>
              <select className="sel" value={reminderForm.days} onChange={e=>setReminderForm(p=>({...p,days:e.target.value}))}>
                {REMINDER_CYCLES.map(r=><option key={r.days} value={r.days}>{r.label}</option>)}
              </select>
            </div>
            <button className="btn-outline" style={{width:'100%',justifyContent:'center'}} onClick={addReminder} disabled={!reminderForm.name.trim()}>+ Add Reminder</button>
          </div>

          <div className="field"><label className="lbl">Notes</label><input className="inp" value={f.notes||''} onChange={e=>sv('notes',e.target.value)} placeholder="Any notes…"/></div>
        </div>
        <div className="modal-foot">
          <button className="btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={()=>f.name.trim()&&onSave(f)} disabled={!f.name.trim()}>Save Customer</button>
        </div>
      </div>
    </div>
  );
}


// ── ATTENDANTS MANAGER ─────────────────────────────────────────
function VAttendants({stores,session,activeStore}){
  const [atts,setAtts]=useState([]);
  const [modal,setModal]=useState(null);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    getAttendants(session.username).then(list=>{setAtts(list);setLoaded(true);});
  },[session.username]);

  async function save(d){
    const updated=d.id?atts.map(a=>a.id===d.id?d:a):[...atts,{...d,id:uid(),createdAt:Date.now(),active:true}];
    setAtts(updated);
    await saveAttendants(session.username,updated);
    setModal(null);
  }
  async function toggle(id){
    const updated=atts.map(a=>a.id===id?{...a,active:!a.active}:a);
    setAtts(updated);
    await saveAttendants(session.username,updated);
  }
  async function del(id){
    if(!confirm('Remove attendant?'))return;
    const updated=atts.filter(a=>a.id!==id);
    setAtts(updated);
    await saveAttendants(session.username,updated);
  }

  if(!loaded)return<div style={{textAlign:'center',padding:40}}><div className="spinner" style={{margin:'0 auto'}}/></div>;

  return(
    <div>
      <div className="notice notice-blue" style={{fontSize:12,marginBottom:14}}>
        👥 Attendants can log in with your username + their PIN to record sales. You see all their sales in real-time on your dashboard.
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
        <button className="btn" onClick={()=>setModal({data:null})}>+ Add Attendant</button>
      </div>
      {atts.length===0&&<div className="card empty-state"><div className="empty-ico">👤</div><div style={{fontSize:13,letterSpacing:2}}>NO ATTENDANTS YET</div><div style={{fontSize:12,marginTop:8,color:'var(--text3)'}}>Add shop attendants to let them record sales</div></div>}
      {atts.map(a=>{
        const store=stores.find(s=>s.id===a.storeId);
        return(
          <div key={a.id} className="card" style={{marginBottom:10,border:`1px solid ${a.active?'var(--border)':'var(--border2)'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{fontWeight:800,fontSize:14}}>👤 {a.name}</span>
                  <span className={`tag ${a.active?'tag-green':'tag-grey'}`}>{a.active?'ACTIVE':'INACTIVE'}</span>
                </div>
                <div style={{fontSize:12,color:'var(--text3)',marginBottom:2}}>📞 {a.phone||'—'}</div>
                <div style={{fontSize:12,color:'var(--text3)',marginBottom:2}}>🏪 {store?.name||'No store assigned'}</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:6,background:'var(--bg3)',padding:'4px 8px',borderRadius:5,display:'inline-block'}}>
                  PIN: <span style={{fontFamily:'var(--fd)',letterSpacing:3,color:'var(--accent)'}}>{'•'.repeat(4)}</span>
                  <span style={{marginLeft:8,color:'var(--text2)',fontSize:9}}>Set when added</span>
                </div>
              </div>
              <div style={{display:'flex',gap:6,flexDirection:'column',alignItems:'flex-end'}}>
                <button className="btn-sm" onClick={()=>setModal({data:a})}>Edit</button>
                <button className="btn-sm" style={{color:a.active?'var(--amber)':'var(--green)',borderColor:a.active?'#f59e0b44':'#22c55e44'}} onClick={()=>toggle(a.id)}>{a.active?'Deactivate':'Activate'}</button>
                <button className="btn-danger" onClick={()=>del(a.id)}>Remove</button>
              </div>
            </div>
          </div>
        );
      })}
      {modal&&<AttendantModal data={modal.data} stores={stores} onSave={save} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function AttendantModal({data,stores,onSave,onClose}){
  const [f,setF]=useState(data||{name:'',phone:'',pin:'',storeId:'',notes:''});
  const [showPin,setShowPin]=useState(false);
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));

  function handleSave(){
    if(!f.name.trim()||!f.storeId)return;
    const d={...f};
    if(f.pin&&!data?.id){d.pin=hashStr2(f.pin);}
    else if(f.pin&&data?.id&&f.pin!==data.pin){d.pin=hashStr2(f.pin);}
    else if(data?.pin){d.pin=data.pin;}
    onSave(d);
  }

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr"><span style={{fontWeight:700}}>{data?'Edit':'Add'} Attendant</span>
          <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18}} onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="field"><label className="lbl">Full Name</label><input className="inp" value={f.name} onChange={e=>sv('name',e.target.value)} placeholder="Attendant name"/></div>
          <div className="field"><label className="lbl">Phone</label><input className="inp" value={f.phone||''} onChange={e=>sv('phone',e.target.value)} placeholder="0244000000"/></div>
          <div className="field"><label className="lbl">Assign to Store</label>
            <select className="sel" value={f.storeId} onChange={e=>sv('storeId',e.target.value)}>
              <option value="">Select store…</option>
              {stores.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>
          <div className="field">
            <label className="lbl">PIN {data?'(leave blank to keep current)':''}</label>
            <div style={{position:'relative'}}>
              <input className="inp" type={showPin?'text':'password'} inputMode="numeric" maxLength={6} value={f.pin||''} onChange={e=>sv('pin',e.target.value.replace(/\D/g,''))} placeholder={data?'Enter new PIN to change':'4-6 digit PIN'} style={{paddingRight:50}}/>
              <button onClick={()=>setShowPin(p=>!p)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13}}>{showPin?'Hide':'Show'}</button>
            </div>
          </div>
          <div className="notice notice-warn" style={{fontSize:11}}>
            Share the PIN with your attendant. They log in at: <strong>Store → Attendant Login</strong>
          </div>
          <div className="field"><label className="lbl">Notes</label><input className="inp" value={f.notes||''} onChange={e=>sv('notes',e.target.value)} placeholder="Role, shift, etc."/></div>
        </div>
        <div className="modal-foot">
          <button className="btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={handleSave} disabled={!f.name.trim()||!f.storeId||(!data&&!f.pin)}>Save Attendant</button>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN ─────────────────────────────────────────────────────
function VAdmin(){
  const [users,setUsers]=useState({});
  const [pending,setPending]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('overview');
  const [customDays,setCustomDays]=useState({});

  useEffect(()=>{
    async function load(){
      const u=await getUsers();setUsers(u);
      if(db)try{const snap=await db.collection('srp_pending').get();setPending(snap.docs.map(d=>({id:d.id,...d.data()})));}catch{}
      setLoading(false);
    }
    load();
  },[]);

  if(loading)return<div style={{textAlign:'center',padding:40}}><div className="spinner" style={{margin:'0 auto 10px'}}/>Loading…</div>;

  const allUsers=Object.keys(users).filter(u=>u!==DEV_U);
  const paying=allUsers.filter(u=>{const s=subStatus(u);return s.active&&!s.trial;});
  const trials=allUsers.filter(u=>{const s=subStatus(u);return s.trial;});
  const revenue=paying.reduce((t,u)=>{const s=subStatus(u);return t+(PLANS[s.plan]?.price||0);},0);

  async function activate(username,plan,days){
    const paidUntil=Date.now()+days*86400000;
    const sub={plan,paid:true,paidUntil,activatedAt:Date.now()};
    setSub(username,sub);
    if(db){try{await db.collection('srp_subscriptions').doc(username).set(sub);await db.collection('srp_pending').doc(username).delete();}catch{}}
    setPending(p=>p.filter(x=>x.id!==username));
    alert(`✅ ${username} activated`);
  }
  async function revoke(username){
    if(!confirm(`Revoke ${username}?`))return;
    setSub(username,{plan:null,paid:false,paidUntil:0,revoked:true});
    alert(`Revoked`);
  }

  return(
    <div>
      <div className="rtabs">
        {[['overview','Overview'],['users','Users'],['revenue','Revenue']].map(([id,l])=>(
          <button key={id} className={`rtab${tab===id?' active':''}`} onClick={()=>setTab(id)}>{l}</button>
        ))}
      </div>
      {tab==='overview'&&(
        <div>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-label">Total Users</div><div className="stat-val">{allUsers.length}</div></div>
            <div className="stat-card"><div className="stat-label">Paying</div><div className="stat-val" style={{color:'var(--green)'}}>{paying.length}</div></div>
            <div className="stat-card"><div className="stat-label">On Trial</div><div className="stat-val" style={{color:'var(--amber)'}}>{trials.length}</div></div>
            <div className="stat-card"><div className="stat-label">Monthly Rev</div><div className="stat-val" style={{fontSize:15,color:'var(--accent)'}}>{fmtMoney(revenue,'GH₵')}</div></div>
          </div>
          {pending.length>0&&(
            <div className="card" style={{border:'1px solid var(--amber)'}}>
              <div className="sec-title" style={{color:'var(--amber)'}}>⏳ Pending ({pending.length})</div>
              {pending.map(p=>(
                <div key={p.id} style={{padding:'10px 0',borderBottom:'1px solid var(--border2)'}}>
                  <div style={{fontWeight:700,marginBottom:8}}>{p.username} — <span style={{color:'var(--accent)'}}>{PLANS[p.plan]?.label||p.plan}</span></div>
                  <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:10,marginBottom:8}}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:11,marginBottom:8}}>
                      <div><div style={{fontSize:9,color:'var(--text3)',letterSpacing:1}}>APP</div><div style={{fontWeight:700,color:'var(--accent)'}}>{p.appName||'Not specified'}</div></div>
                      <div><div style={{fontSize:9,color:'var(--text3)',letterSpacing:1}}>NETWORK</div><div style={{fontWeight:700}}>{p.network||'—'}</div></div>
                      <div><div style={{fontSize:9,color:'var(--text3)',letterSpacing:1}}>AMOUNT</div><div style={{fontWeight:700,color:'var(--green)'}}>GH₵{((p.amount||0)/100).toFixed(2)}</div></div>
                      <div><div style={{fontSize:9,color:'var(--text3)',letterSpacing:1}}>DATE</div><div style={{fontWeight:600,fontSize:10}}>{p.requestedAtStr||new Date(p.requestedAt).toLocaleDateString()}</div></div>
                    </div>
                    <div style={{padding:'8px 10px',background:'var(--bg2)',borderRadius:6,border:'1px solid #f59e0b44'}}>
                      <div style={{fontSize:9,color:'var(--amber)',letterSpacing:2,marginBottom:3,fontWeight:700}}>🔑 TRANSACTION ID</div>
                      <div style={{fontFamily:'var(--fd)',fontSize:15,fontWeight:700,color:'var(--amber)',letterSpacing:1}}>{p.txnId||<span style={{color:'var(--text3)',fontFamily:'var(--fm)',fontWeight:400,fontSize:11}}>Not provided</span>}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    <button className="btn-sm" style={{fontSize:9}} onClick={()=>activate(p.username,'basic',30)}>Basic 30d</button>
                    <button className="btn-sm" style={{fontSize:9}} onClick={()=>activate(p.username,'standard',30)}>Standard 30d</button>
                    <button className="btn-sm" style={{fontSize:9}} onClick={()=>activate(p.username,'premium',30)}>Premium 30d</button>
                    <button className="btn-danger" style={{fontSize:9,marginLeft:'auto'}} onClick={()=>{if(db)try{db.collection('srp_pending').doc(p.id).delete();}catch{}setPending(pp=>pp.filter(x=>x.id!==p.id));}}>✕ Reject</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {tab==='users'&&(
        <div>
          {allUsers.map(u=>{
            const usr=users[u];const s=subStatus(u);const days=customDays[u]||30;
            return(
              <div key={u} className="card" style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8,flexWrap:'wrap',gap:6}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{usr?.business||u}</div>
                    <div style={{fontSize:10,color:'var(--text3)'}}>@{u} · {usr?.currency||'GHS'}</div>
                  </div>
                  <span className={`tag ${s.active&&!s.trial?'tag-green':s.trial?'tag-amber':'tag-red'}`}>
                    {s.active&&!s.trial?`ACTIVE · ${s.plan?.toUpperCase()}`:(s.trial?`TRIAL ${s.daysLeft}d`:'EXPIRED')}
                  </span>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                  <input type="number" value={days} onChange={e=>setCustomDays(c=>({...c,[u]:parseInt(e.target.value)||30}))} style={{width:55,padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',fontSize:12}} min="1"/>
                  <span style={{fontSize:10,color:'var(--text3)'}}>days</span>
                  {['basic','standard','premium'].map(plan=>(
                    <button key={plan} className="btn-sm" style={{fontSize:9}} onClick={()=>activate(u,plan,days)}>{plan.charAt(0).toUpperCase()+plan.slice(1)}</button>

                  <button className="btn-danger" style={{fontSize:9}} onClick={()=>revoke(u)}>Revoke</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {tab==='revenue'&&(
        <div>
          <div className="card">
            <div className="sec-title">Revenue by Plan</div>
            {Object.values(PLANS).map(plan=>{
              const count=paying.filter(u=>subStatus(u).plan===plan.id).length;
              return(
                <div key={plan.id} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border2)'}}>
                  <span style={{fontSize:13,color:'var(--text2)'}}>{plan.name} ({plan.label})</span>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700,color:'var(--accent)',fontFamily:'var(--fd)',fontSize:13}}>{fmtMoney(count*plan.price,'GH₵')}</div>
                    <div style={{fontSize:10,color:'var(--text3)'}}>{count} user{count!==1?'s':''}</div>
                  </div>
                </div>
              );
            })}
            <div style={{display:'flex',justifyContent:'space-between',padding:'12px 0',fontWeight:800,fontSize:15}}>
              <span>Total Monthly</span><span style={{color:'var(--accent)',fontFamily:'var(--fd)'}}>{fmtMoney(revenue,'GH₵')}</span>
            </div>
          </div>
          <div className="card">
            <div className="sec-title">Payment Numbers</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div style={{background:'#f59e0b22',border:'1px solid #f59e0b44',borderRadius:8,padding:12,textAlign:'center'}}>
                <div style={{fontSize:8,letterSpacing:2,color:'var(--amber)',fontWeight:700,marginBottom:3}}>MTN MOMO</div>
                <div style={{fontSize:15,fontWeight:800,color:'var(--amber)',fontFamily:'var(--fd)'}}>{OWNER.mtn}</div>
              </div>
              <div style={{background:'#ef444422',border:'1px solid #ef444444',borderRadius:8,padding:12,textAlign:'center'}}>
                <div style={{fontSize:8,letterSpacing:2,color:'var(--red)',fontWeight:700,marginBottom:3}}>TELECEL</div>
                <div style={{fontSize:15,fontWeight:800,color:'var(--red)',fontFamily:'var(--fd)'}}>{OWNER.telecel}</div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────
function Dashboard({session,onLogout}){
  const [view,setView]=useState('dashboard');
  const [stores,setStores]=useState([]);
  const [products,setProducts]=useState([]);
  const [sales,setSales]=useState([]);
  const [customers,setCustomers]=useState([]);
  const [activeStore,setActiveStore]=useState(null);
  const [syncState,setSyncState]=useState('saved');
  const [loaded,setLoaded]=useState(false);
  const [storeModal,setStoreModal]=useState(false);
  const saveTimer=useRef(null);
  const u=session.username;

  useEffect(()=>{
    async function init(){
      if(db)try{const snap=await db.collection('srp_data').doc(u).get();if(snap.exists){const d=snap.data();setStores(d.stores||[]);setProducts(d.products||[]);setSales(d.sales||[]);setCustomers(d.customers||[]);setCustomers(d.customers||[]);if(d.stores?.length>0)setActiveStore(d.stores[0].id);setLoaded(true);return;}}catch{}
      const local=lsGet(`srp-data-${u}`);
      if(local){setStores(local.stores||[]);setProducts(local.products||[]);setSales(local.sales||[]);setCustomers(local.customers||[]);if(local.stores?.length>0)setActiveStore(local.stores[0].id);}
      setLoaded(true);
    }
    init();
  },[u]);

  useEffect(()=>{
    if(!db||!loaded)return;
    const unsub=db.collection('srp_data').doc(u).onSnapshot(snap=>{if(snap.exists&&!snap.metadata.hasPendingWrites){const d=snap.data();setStores(d.stores||[]);setProducts(d.products||[]);setSales(d.sales||[]);setCustomers(d.customers||[]);}},()=>{});
    return unsub;
  },[u,loaded]);

  function doSave(st,pr,sa,cu){
    clearTimeout(saveTimer.current);setSyncState('saving');
    saveTimer.current=setTimeout(async()=>{await saveData(u,{stores:st,products:pr,sales:sa,customers:cu,updatedAt:Date.now()});setSyncState('saved');},1000);
  }
  function setS(fn){setStores(ss=>{const n=typeof fn==='function'?fn(ss):fn;doSave(n,products,sales,customers);if(n.length>0&&!activeStore)setActiveStore(n[0].id);return n;});}
  function setP(fn){setProducts(pp=>{const n=typeof fn==='function'?fn(pp):fn;doSave(stores,n,sales,customers);return n;});}
  function setSa(fn){setSales(ss=>{const n=typeof fn==='function'?fn(ss):fn;doSave(stores,products,n,customers);return n;});}
  function setCu(fn){setCustomers(cc=>{const n=typeof fn==='function'?fn(cc):fn;doSave(stores,products,sales,n);return n;});}

  const NAV=[
    {id:'dashboard',label:'Dashboard',ico:'📊'},
    {id:'sell',label:'New Sale',ico:'🛒'},
    {id:'products',label:'Products',ico:'📦'},
    {id:'history',label:'Sales',ico:'🧾'},
    {id:'reports',label:'Reports',ico:'📈'},
    {id:'stores',label:'Stores',ico:'🏪'},
    {id:'customers',label:'Customers',ico:'👥'},
    {id:'attendants',label:'Attendants',ico:'👤'},
    ...(session.isDev?[{id:'admin',label:'Admin',ico:'⚙️'}]:[]),
  ];

  const sc={saving:'var(--amber)',saved:'var(--green)',error:'var(--red)'}[syncState]||'var(--text3)';

  function handleAddStore(){setStoreModal(true);setView('stores');}

  if(!loaded)return<div className="loading"><div className="spinner"/><div style={{fontSize:10,letterSpacing:3,color:'var(--text3)'}}>LOADING DATA…</div></div>;

  // First time — prompt to add store
  if(stores.length===0&&loaded){
    return(
      <div className="auth-wrap">
        <div style={{width:'100%',maxWidth:400,textAlign:'center'}} className="fade-in">
          <div style={{fontSize:50,marginBottom:12}}>🏪</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>Welcome to StorePOS!</div>
          <div style={{fontSize:13,color:'var(--text3)',marginBottom:24}}>Add your first store to get started. You can add multiple store locations.</div>
          <StoreModal data={null} onSave={d=>{setS(ss=>[...ss,{...d,id:uid(),createdAt:Date.now()}]);}} onClose={()=>{}}/>
        </div>
      </div>
    );
  }

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sb-logo">
          <div style={{fontSize:28,marginBottom:6}}>📦</div>
          <div className="sb-logo-main">StorePOS</div>
          <div className="sb-logo-sub">{session.business}</div>
        </div>
        {stores.length>0&&(
          <div style={{padding:'8px 8px 0'}}>
            <StoreSelector stores={stores} activeStore={activeStore} setActiveStore={setActiveStore} onAdd={handleAddStore}/>
          </div>
        )}
        <div className="sb-nav">
          {NAV.map(n=>(
            <button key={n.id} className={`sb-item${view===n.id?' active':''}`} onClick={()=>setView(n.id)}>
              <span style={{fontSize:16}}>{n.ico}</span>{n.label}
              {session.isDev&&n.id==='admin'&&<span className="dev-pill">DEV</span>}
            </button>
          ))}
        </div>
        <div style={{marginTop:'auto',padding:'12px 8px',borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',marginBottom:4}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:sc}}/>
            <span style={{fontSize:11,color:'var(--text3)'}}>{syncState==='saving'?'Saving…':'Saved'}</span>
            <span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>{getSym(session.currency)}</span>
          </div>
          <button className="sb-item" style={{color:'var(--red)'}} onClick={onLogout}>
            <span style={{fontSize:16}}>🚪</span>Sign Out
          </button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0}}>
            <span style={{fontSize:20}}>{NAV.find(n=>n.id===view)?.ico}</span>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:800,fontSize:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{NAV.find(n=>n.id===view)?.label}</div>
              <div style={{fontSize:10,color:'var(--text3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{stores.find(s=>s.id===activeStore)?.name||session.business}</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            {stores.length>1&&(
              <div style={{maxWidth:130}}>
                <StoreSelector stores={stores} activeStore={activeStore} setActiveStore={setActiveStore} onAdd={handleAddStore}/>
              </div>
            )}
            <div style={{width:7,height:7,borderRadius:'50%',background:sc}}/>
            <button className="hide-mob" style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:12,fontFamily:'var(--fm)',fontWeight:600}} onClick={onLogout}>Sign Out</button>
          </div>
        </div>
        <div className="content">
          <div className="fade-in">
            {view==='dashboard'&&<VDash stores={stores} products={products} sales={sales} customers={customers} session={session} setView={setView} activeStore={activeStore}/>}
            {view==='sell'&&<VSell products={products} setSales={setSa} setProducts={setP} session={session} activeStore={activeStore} stores={stores} customers={customers}/>}
            {view==='products'&&<VProducts stores={stores} products={products} setProducts={setP} session={session} activeStore={activeStore}/>}
            {view==='history'&&<VSalesHistory sales={sales} products={products} session={session} setSales={setSa} activeStore={activeStore} stores={stores} customers={customers}/>}
            {view==='reports'&&<VReports sales={sales} products={products} session={session} activeStore={activeStore}/>}
            {view==='stores'&&<VStores stores={stores} setStores={setS} products={products} sales={sales} session={session}/>}
            {view==='customers'&&<VCustomers customers={customers} setCustomers={setCu} sales={sales} stores={stores} session={session} activeStore={activeStore} setView={setView}/>}
            {view==='attendants'&&<VAttendants stores={stores} session={session} activeStore={activeStore}/>}
            {view==='admin'&&session.isDev&&<VAdmin/>}
          </div>
        </div>
      </div>

      <MobileNav NAV={NAV} view={view} setView={setView} onLogout={onLogout} session={session} syncState={syncState}/>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [ready,setReady]=useState(false);

  const [mode,setMode]=useState('owner'); // 'owner' | 'attendant'
  const [attSession,setAttSession]=useState(null);

  useEffect(()=>{
    const users=lsGet('srp-users')||{};
    users[DEV_U]={hash:hashStr(DEV_P),business:'AMIN MOTORS & TRANSPORT',currency:'GHS',isDev:true,created:0};
    lsSet('srp-users',users);
    const s=lsGet('srp-session');
    if(s?.username)setSession(s);
    const as=getAttendantSession();
    if(as?.username&&as?.isAttendant)setAttSession(as);
    setReady(true);
  },[]);

  function login(s){setSession(s);lsSet('srp-session',s);if(!s.isDev&&!getSub(s.username))startTrial(s.username);}
  function logout(){setSession(null);lsSet('srp-session',null);window.location.reload();}
  function attLogin(s){setAttSession(s);setAttendantSession(s);}
  function attLogout(){setAttSession(null);clearAttendantSession();window.location.reload();}

  if(!ready)return<div className="loading"><div className="spinner"/></div>;

  // Attendant mode
  if(mode==='attendant'||attSession?.isAttendant){
    if(!attSession)return<AttendantLogin onLogin={attLogin}/>;
    return<AttendantDashboard session={attSession} onLogout={attLogout}/>;
  }

  // Owner mode
  if(!session){
    return(
      <div>
        <Auth onLogin={login}/>
        <div style={{position:'fixed',bottom:20,left:0,right:0,textAlign:'center'}}>
          <button onClick={()=>setMode('attendant')} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text2)',padding:'10px 20px',cursor:'pointer',fontFamily:'var(--fm)',fontSize:12,fontWeight:600}}>
            👤 Attendant Login →
          </button>
        </div>
      </div>
    );
  }
  const status=subStatus(session.username);
  if(!status.active)return<SubWall username={session.username} onActivated={()=>setSession({...lsGet('srp-session')})} />;
  return<Dashboard session={session} onLogout={logout}/>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
