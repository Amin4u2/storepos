                  <div style={{fontWeight:700,fontSize:13}}>{item.name}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>{item.qty} units sold</div>
                </div>
              </div>
              <div style={{fontFamily:'var(--fd)',fontWeight:700,color:'var(--accent)',fontSize:12}}>{fmtMoney(item.revenue,sym)}</div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── STORES ────────────────────────────────────────────────────
function VStores({stores,setStores,products,sales,session}){
  const [modal,setModal]=useState(null);
  const sym=getSym(session.currency);

  function save(d){setStores(ss=>d.id?ss.map(s=>s.id===d.id?d:s):[...ss,{...d,id:uid(),createdAt:Date.now()}]);setModal(null);}
  function del(id){
    const hasProd=products.some(p=>p.storeId===id);
    if(hasProd&&!confirm('This store has products. Delete anyway?'))return;
    setStores(ss=>ss.filter(s=>s.id!==id));
  }

  return(
    <div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
        <button className="btn" onClick={()=>setModal({data:null})}>+ Add Store</button>
      </div>
      {stores.length===0&&<div className="card empty-state"><div className="empty-ico">🏪</div><div style={{fontSize:13,letterSpacing:2}}>NO STORES YET</div></div>}
      {stores.map(s=>{
        const sp=products.filter(p=>p.storeId===s.id);
        const ss=sales.filter(sa=>sa.storeId===s.id);
        const rev=ss.reduce((t,sa)=>t+sa.total,0);
        return(
          <div key={s.id} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:15,marginBottom:3}}>🏪 {s.name}</div>
                {s.location&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>📍 {s.location}</div>}
                {s.phone&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>📞 {s.phone}</div>}
                <div style={{display:'flex',gap:12,fontSize:11,color:'var(--text2)',marginTop:6}}>
                  <span>📦 {sp.length} products</span>
                  <span>🧾 {ss.length} sales</span>
                  <span style={{color:'var(--accent)',fontFamily:'var(--fd)',fontWeight:700}}>{fmtMoney(rev,sym)}</span>
                </div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn-sm" onClick={()=>setModal({data:s})}>Edit</button>
                <button className="btn-danger" onClick={()=>del(s.id)}>Del</button>
              </div>
            </div>
          </div>
        );
      })}
      {modal&&<StoreModal data={modal.data} onSave={save} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function StoreModal({data,onSave,onClose}){
  const [f,setF]=useState(data||{name:'',location:'',phone:'',notes:''});
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));
  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr"><span style={{fontWeight:700}}>{data?'Edit':'Add'} Store</span>
          <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18}} onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="field"><label className="lbl">Store Name</label><input className="inp" value={f.name} onChange={e=>sv('name',e.target.value)} placeholder="e.g. Main Branch, Airport Branch"/></div>
          <div className="field"><label className="lbl">Location</label><input className="inp" value={f.location} onChange={e=>sv('location',e.target.value)} placeholder="e.g. Kumasi Central Market"/></div>
          <div className="field"><label className="lbl">Phone</label><input className="inp" value={f.phone} onChange={e=>sv('phone',e.target.value)} placeholder="0244000000"/></div>
          <div className="field"><label className="lbl">Notes</label><input className="inp" value={f.notes} onChange={e=>sv('notes',e.target.value)} placeholder="Any notes…"/></div>
        </div>
        <div className="modal-foot">
          <button className="btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={()=>f.name.trim()&&onSave(f)} disabled={!f.name.trim()}>Save Store</button>
        </div>
      </div>
    </div>
  );
}

function printOrShare(html, filename){
  const win = window.open('','_blank');
  if(!win){alert('Allow popups to print/view document.');return;}
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(()=>win.print(), 500);
}

// ── REMINDER MESSAGE BUILDER ────────────────────────────────────
function buildReminderMsg(customer, product, store, daysOverdue){
  const greeting = `Hello ${customer.name}!`;
  const overdue = daysOverdue > 0;
  return `${greeting}\n\nThis is a reminder from ${store?.name||'our store'}.\n\n` +
    `${overdue ? `Your ${product.name} service is ${daysOverdue} day(s) overdue.` : `Your ${product.name} is due for replacement/service soon.`}\n\n` +
    `Based on your vehicle${customer.vehicle?` (${customer.vehicle})`:''}, we recommend changing your ${product.name} every ${product.reminderDays} days.\n\n` +
    `📞 Call us: ${store?.phone||''}\n` +
    `📍 ${store?.location||'Visit our store'}\n\n` +
    `Reply to this message to book an appointment.\nThank you! 🙏`;
}

// ── CUSTOMER MODAL ─────────────────────────────────────────────
function CustomerModal({data, onSave, onClose}){
  const [f, setF] = useState(data||{name:'',phone:'',email:'',address:'',vehicle:'',vehicleType:'',plateNumber:'',notes:'',reminders:[]});
  const [reminderForm, setReminderForm] = useState({name:'',days:14});
  const sv = (k,v)=>setF(p=>({...p,[k]:v}));

  function addReminder(){
    if(!reminderForm.name.trim())return;
    const nextDate = new Date();
    nextDate.setDate(nextDate.getDate()+parseInt(reminderForm.days));
    const r = {name:reminderForm.name,days:parseInt(reminderForm.days),nextDate:nextDate.toISOString().slice(0,10)};
    setF(p=>({...p,reminders:[...(p.reminders||[]),r]}));
    setReminderForm({name:'',days:14});
  }
  function removeReminder(i){setF(p=>({...p,reminders:p.reminders.filter((_,idx)=>idx!==i)}));}
  function snoozeReminder(i,days){
    setF(p=>{
      const rs=[...(p.reminders||[])];
      const next=new Date();next.setDate(next.getDate()+days);
      rs[i]={...rs[i],nextDate:next.toISOString().slice(0,10)};
      return{...p,reminders:rs};
    });
  }

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr"><span style={{fontWeight:700}}>{data?'Edit':'Add'} Customer</span>
          <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18}} onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div style={{fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:12,fontWeight:700}}>PERSONAL INFO</div>
          <div className="field"><label className="lbl">Full Name *</label><input className="inp" value={f.name} onChange={e=>sv('name',e.target.value)} placeholder="Customer name"/></div>
          <div className="form-grid">
            <div className="field"><label className="lbl">Phone</label><input className="inp" value={f.phone||''} onChange={e=>sv('phone',e.target.value)} placeholder="0244000000" type="tel"/></div>
            <div className="field"><label className="lbl">Email</label><input className="inp" value={f.email||''} onChange={e=>sv('email',e.target.value)} placeholder="email@example.com" type="email"/></div>
          </div>
          <div className="field"><label className="lbl">Address</label><input className="inp" value={f.address||''} onChange={e=>sv('address',e.target.value)} placeholder="Home or work address"/></div>

          <div style={{fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:12,marginTop:4,fontWeight:700}}>VEHICLE INFO (Optional)</div>
          <div className="form-grid">
            <div className="field"><label className="lbl">Vehicle / Model</label><input className="inp" value={f.vehicle||''} onChange={e=>sv('vehicle',e.target.value)} placeholder="e.g. Toyota Corolla"/></div>
            <div className="field"><label className="lbl">Type</label>

                <option value="">Select…</option>

            </div>
          </div>
          <div className="field"><label className="lbl">Plate Number</label><input className="inp" value={f.plateNumber||''} onChange={e=>sv('plateNumber',e.target.value.toUpperCase())} placeholder="GR-1234-22"/></div>

          <div style={{fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:12,marginTop:4,fontWeight:700}}>🔔 PRODUCT REMINDERS</div>
          <div className="notice notice-blue" style={{fontSize:11,marginBottom:12}}>Set reminders for products this customer needs regularly (e.g. Engine Oil every 14 days)</div>

          {(f.reminders||[]).map((r,i)=>(
            <div key={i} style={{display:'flex',gap:8,alignItems:'center',background:'var(--bg3)',borderRadius:8,padding:10,marginBottom:8,flexWrap:'wrap'}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13}}>{r.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>Every {r.days} days · Next: {fmtDate(r.nextDate)}</div>
              </div>
              <div style={{display:'flex',gap:5}}>
                <button onClick={()=>snoozeReminder(i,r.days)} style={{padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,color:'var(--amber)',fontSize:10,cursor:'pointer',fontFamily:'var(--fm)'}}>Reset</button>
                <button onClick={()=>removeReminder(i)} style={{padding:'4px 8px',background:'none',border:'1px solid #ef444444',borderRadius:5,color:'var(--red)',fontSize:10,cursor:'pointer',fontFamily:'var(--fm)'}}>✕</button>
              </div>
            </div>
          ))}

          <div style={{background:'var(--bg)',border:'1px dashed var(--border)',borderRadius:8,padding:12,marginBottom:12}}>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:8,fontWeight:700}}>+ Add Reminder</div>
            <div className="form-grid" style={{marginBottom:8}}>
              <input className="inp" value={reminderForm.name} onChange={e=>setReminderForm(p=>({...p,name:e.target.value}))} placeholder="Product (e.g. Engine Oil)"/>
              <select className="sel" value={reminderForm.days} onChange={e=>setReminderForm(p=>({...p,days:e.target.value}))}>
                {REMINDER_CYCLES.map(r=><option key={r.days} value={r.days}>{r.label}</option>)}
              </select>
            </div>
            <button className="btn-outline" style={{width:'100%',justifyContent:'center'}} onClick={addReminder} disabled={!reminderForm.name.trim()}>+ Add Reminder</button>

        </div>

        </div>
      </div>
    </div>
  );
}


// ── ATTENDANTS MANAGER ─────────────────────────────────────────
function VAttendants({stores,session,activeStore}){
  const [atts,setAtts]=useState([]);
  const [modal,setModal]=useState(null);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    getAttendants(session.username).then(list=>{setAtts(list);setLoaded(true);});
  },[session.username]);

  async function save(d){
    const updated=d.id?atts.map(a=>a.id===d.id?d:a):[...atts,{...d,id:uid(),createdAt:Date.now(),active:true}];
    setAtts(updated);
    setModal(null); // close immediately — don't wait for Firestore
    try{await saveAttendants(session.username,updated);}catch(e){console.warn('Save attendant error:',e);}
  }
  async function toggle(id){
    const updated=atts.map(a=>a.id===id?{...a,active:!a.active}:a);
    setAtts(updated);
    await saveAttendants(session.username,updated);
  }
  async function del(id){
    if(!confirm('Remove attendant?'))return;
    const updated=atts.filter(a=>a.id!==id);
    setAtts(updated);
    await saveAttendants(session.username,updated);
  }

  if(!loaded)return<div style={{textAlign:'center',padding:40}}><div className="spinner" style={{margin:'0 auto'}}/></div>;

  return(
    <div>
      <div className="notice notice-blue" style={{fontSize:12,marginBottom:14}}>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{fontWeight:800,fontSize:14}}>👤 {a.name}</span>
                  <span className={`tag ${a.active?'tag-green':'tag-grey'}`}>{a.active?'ACTIVE':'INACTIVE'}</span>
                </div>
                <div style={{fontSize:12,color:'var(--text3)',marginBottom:2}}>📞 {a.phone||'—'}</div>
                <div style={{fontSize:12,color:'var(--text3)',marginBottom:2}}>🏪 {store?.name||'No store assigned'}</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:6,background:'var(--bg3)',padding:'4px 8px',borderRadius:5,display:'inline-block'}}>
                  PIN: <span style={{fontFamily:'var(--fd)',letterSpacing:3,color:'var(--accent)'}}>{'•'.repeat(4)}</span>
                  <span style={{marginLeft:8,color:'var(--text2)',fontSize:9}}>Set when added</span>
                </div>
              </div>
              <div style={{display:'flex',gap:6,flexDirection:'column',alignItems:'flex-end'}}>
                <button className="btn-sm" onClick={()=>setModal({data:a})}>Edit</button>

                <button className="btn-danger" onClick={()=>del(a.id)}>Remove</button>
              </div>
            </div>
          </div>
        );
      })}
      {modal&&<AttendantModal data={modal.data} stores={stores} onSave={save} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function AttendantModal({data,stores,onSave,onClose}){
  const [f,setF]=useState(data||{name:'',phone:'',pin:'',storeId:'',notes:''});
  const [showPin,setShowPin]=useState(false);
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));

  const [saving,setSaving]=useState(false);
  function handleSave(){
    if(!f.name.trim()||!f.storeId||saving)return;
    setSaving(true);
    const d={...f};
    if(f.pin&&!data?.id){d.pin=hashStr2(f.pin);}
    else if(f.pin&&data?.id&&f.pin!==data.pin){d.pin=hashStr2(f.pin);}
    else if(data?.pin){d.pin=data.pin;}
    onSave(d); // parent closes modal
  }

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr"><span style={{fontWeight:700}}>{data?'Edit':'Add'} Attendant</span>
          <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18}} onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="field"><label className="lbl">Full Name</label><input className="inp" value={f.name} onChange={e=>sv('name',e.target.value)} placeholder="Attendant name"/></div>
          <div className="field"><label className="lbl">Phone</label><input className="inp" value={f.phone||''} onChange={e=>sv('phone',e.target.value)} placeholder="0244000000"/></div>
          <div className="field"><label className="lbl">Assign to Store</label>
            <select className="sel" value={f.storeId} onChange={e=>sv('storeId',e.target.value)}>
              <option value="">Select store…</option>
              {stores.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>
          <div className="field">
            <label className="lbl">PIN {data?'(leave blank to keep current)':''}</label>
            <div style={{position:'relative'}}>
              <input className="inp" type={showPin?'text':'password'} inputMode="numeric" maxLength={6} value={f.pin||''} onChange={e=>sv('pin',e.target.value.replace(/\D/g,''))} placeholder={data?'Enter new PIN to change':'4-6 digit PIN'} style={{paddingRight:50}}/>
              <button onClick={()=>setShowPin(p=>!p)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13}}>{showPin?'Hide':'Show'}</button>
            </div>
          </div>
          <div className="notice notice-warn" style={{fontSize:11}}>
            Share the PIN with your attendant. They log in at: <strong>Store → Attendant Login</strong>
          </div>
          <div className="field"><label className="lbl">Notes</label><input className="inp" value={f.notes||''} onChange={e=>sv('notes',e.target.value)} placeholder="Role, shift, etc."/></div>
        </div>
        <div className="modal-foot">
          <button className="btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={handleSave} disabled={!f.name.trim()||!f.storeId||(!data&&!f.pin)||saving}>{saving?'Saving…':'Save Attendant'}</button>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN ─────────────────────────────────────────────────────
function VAdmin(){
  const [users,setUsers]=useState({});
  const [subs,setSubs]=useState({});
  const [pending,setPending]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('pending');
  const [customDays,setCustomDays]=useState({});
  const [search,setSearch]=useState('');
  const [tick,setTick]=useState(0);

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const u=await getUsers(); setUsers(u);
      if(db){
        try{
          const ss=await db.collection('srp_subscriptions').get();
          const m={};
          ss.docs.forEach(d=>{m[d.id]=d.data();lsSet(`srp-sub-${d.id}`,d.data());});
          setSubs(m);
        }catch(e){console.warn('subs',e);}
        try{
          const ps=await db.collection('srp_pending').get();
          setPending(ps.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.requestedAt-a.requestedAt));
        }catch(e){console.warn('pend',e);}
      }
      setLoading(false);
    }
    load();
  },[tick]);

  async function activate(username,plan,days){
    const paidUntil=Date.now()+days*86400000;
    const sub={plan,paid:true,paidUntil,activatedAt:Date.now(),daysGranted:days};
    lsSet(`srp-sub-${username}`,sub);
    setSubs(s=>({...s,[username]:sub}));
    if(db){
      try{
        await db.collection('srp_subscriptions').doc(username).set(sub);
        await db.collection('srp_pending').doc(username).delete();
      }catch(e){alert('Error: '+e.message);return;}
    }
    setPending(p=>p.filter(x=>x.id!==username));
    alert('✅ '+username+' activated on '+plan+' for '+days+' days!');
  }

  async function revoke(username){
    if(!confirm('Revoke '+username+'?'))return;
    const sub={plan:null,paid:false,paidUntil:0,revoked:true,revokedAt:Date.now()};
    lsSet(`srp-sub-${username}`,sub);
    setSubs(s=>({...s,[username]:sub}));
    if(db)try{await db.collection('srp_subscriptions').doc(username).set(sub);}catch{}
    alert('Revoked.');
  }

  const getS=u=>subs[u]||getSub(u)||null;
  const getStatus=u=>{
    if(u===DEV_U)return{active:true,trial:false,plan:'premium',label:'DEV'};
    const s=getS(u); if(!s)return{active:false,label:'No Sub'};
    const now=Date.now();
    if(s.trialEnd&&now<s.trialEnd&&!s.paid)return{active:true,trial:true,daysLeft:Math.ceil((s.trialEnd-now)/86400000),plan:s.plan,label:'Trial '+Math.ceil((s.trialEnd-now)/86400000)+'d'};
    if(s.paid&&s.paidUntil&&now<s.paidUntil)return{active:true,trial:false,plan:s.plan,daysLeft:Math.ceil((s.paidUntil-now)/86400000),paidUntil:s.paidUntil,label:s.plan?.toUpperCase()+' '+Math.ceil((s.paidUntil-now)/86400000)+'d'};
    if(s.revoked)return{active:false,label:'Revoked'};
    return{active:false,label:'Expired'};
  };

  if(loading)return <div style={{textAlign:'center',padding:60}}><div className="spinner" style={{margin:'0 auto 12px'}}/><div style={{fontSize:12,color:'var(--text3)',letterSpacing:2}}>LOADING…</div></div>;

  const allU=Object.keys(users).filter(u=>u!==DEV_U);
  const paying=allU.filter(u=>{const s=getStatus(u);return s.active&&!s.trial;});
  const trials=allU.filter(u=>getStatus(u).trial);
  const expired=allU.filter(u=>!getStatus(u).active);
  const revenue=paying.reduce((t,u)=>t+(PLANS[getStatus(u).plan]?.price||0),0);

  const filtered=allU.filter(u=>!search||u.includes(search.toLowerCase())||(users[u]?.business||'').toLowerCase().includes(search.toLowerCase()))
    .filter(u=>{
      const s=getStatus(u);
      if(tab==='active')return s.active&&!s.trial;
      if(tab==='trial')return s.trial;
      if(tab==='expired')return !s.active;
      return true;
    });

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div><div style={{fontWeight:800,fontSize:16}}>⚙️ Admin Panel</div><div style={{fontSize:11,color:'var(--text3)'}}>Manage StorePOS subscribers</div></div>
        <button className="btn-outline" onClick={()=>setTick(t=>t+1)} style={{fontSize:11,minHeight:36,padding:'6px 14px'}}>🔄 Refresh</button>
      </div>

      <div className="stats-grid" style={{marginBottom:14}}>
        <div className="stat-card"><div className="stat-label">Total Users</div><div className="stat-val">{allU.length}</div></div>
        <div className="stat-card"><div className="stat-label">Paying</div><div className="stat-val" style={{color:'var(--green)'}}>{paying.length}</div></div>
        <div className="stat-card"><div className="stat-label">Trial</div><div className="stat-val" style={{color:'var(--amber)'}}>{trials.length}</div></div>
        <div className="stat-card"><div className="stat-label">Monthly Rev</div><div className="stat-val" style={{fontSize:14,color:'var(--accent)'}}>GH₵{(revenue/100).toFixed(2)}</div></div>
      </div>

      <div className="rtabs">
        <button className={`rtab${tab==='pending'?' active':''}`} onClick={()=>setTab('pending')} style={pending.length>0&&tab!=='pending'?{borderColor:'var(--amber)',color:'var(--amber)'}:{}}>⏳ Pending {pending.length>0&&`(${pending.length})`}</button>
        <button className={`rtab${tab==='active'?' active':''}`} onClick={()=>setTab('active')}>✅ Active ({paying.length})</button>
        <button className={`rtab${tab==='trial'?' active':''}`} onClick={()=>setTab('trial')}>🎁 Trial ({trials.length})</button>
        <button className={`rtab${tab==='expired'?' active':''}`} onClick={()=>setTab('expired')}>❌ Expired ({expired.length})</button>
        <button className={`rtab${tab==='all'?' active':''}`} onClick={()=>setTab('all')}>👥 All ({allU.length})</button>
        <button className={`rtab${tab==='revenue'?' active':''}`} onClick={()=>setTab('revenue')}>💰 Revenue</button>
      </div>

      {tab==='pending'&&(
        <div>
          {pending.length===0
            ?<div className="card empty-state"><div className="empty-ico">✅</div><div>No pending payments</div></div>
            :pending.map(p=>(
            <div key={p.id} className="card" style={{border:'1px solid #f59e0b55',marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div><div style={{fontWeight:800,fontSize:15}}>👤 {p.username}</div><div style={{fontSize:11,color:'var(--text3)'}}>{p.requestedAtStr||new Date(p.requestedAt).toLocaleString()}</div></div>
                <span className="tag tag-amber">⏳ PENDING</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                {[['APP',p.appName||'—','var(--accent)'],['PLAN',(PLANS[p.plan]?.name||p.plan)+' · '+(PLANS[p.plan]?.label||''),'var(--text)'],['NETWORK',p.network||'—','var(--text)'],['AMOUNT','GH₵'+((p.amount||0)/100).toFixed(2),'var(--green)']].map(([l,v,c])=>(
                  <div key={l} style={{background:'var(--bg)',borderRadius:6,padding:'8px 10px'}}>
                    <div style={{fontSize:9,color:'var(--text3)',letterSpacing:1,marginBottom:2}}>{l}</div>
                    <div style={{fontWeight:700,fontSize:12,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{background:'#f59e0b11',border:'1px solid #f59e0b44',borderRadius:8,padding:'10px 14px',marginBottom:12}}>
                <div style={{fontSize:9,color:'var(--amber)',letterSpacing:2,fontWeight:700,marginBottom:6}}>🔑 MOMO TRANSACTION ID — VERIFY BEFORE ACTIVATING</div>
                <div style={{fontFamily:'var(--fd)',fontSize:20,fontWeight:800,color:'var(--amber)',letterSpacing:2,wordBreak:'break-all'}}>{p.txnId||<span style={{color:'var(--text3)',fontFamily:'var(--fm)',fontWeight:400,fontSize:12}}>Not provided</span>}</div>
              </div>
              <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,letterSpacing:1,marginBottom:8}}>ACTIVATE AS (30 DAYS):</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:8}}>
                {Object.values(PLANS).map(pl=>(
                  <button key={pl.id} className="btn" style={{fontSize:11,padding:'10px 6px',justifyContent:'center',flexDirection:'column',gap:2}} onClick={()=>activate(p.username,pl.id,30)}>
                    <span>{pl.name}</span><span style={{fontSize:9,opacity:.7}}>{pl.label}</span>
                  </button>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn-outline" style={{flex:1,justifyContent:'center',fontSize:12}} onClick={()=>activate(p.username,p.plan||'standard',30)}>✅ Activate ({(PLANS[p.plan]?.name||p.plan)})</button>
                <button className="btn-danger" style={{padding:'10px 14px'}} onClick={()=>{if(db)try{db.collection('srp_pending').doc(p.id).delete();}catch{}setPending(pp=>pp.filter(x=>x.id!==p.id));}}>✕ Reject</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {['all','active','trial','expired'].includes(tab)&&(
        <div>
          <div className="search-wrap">
            <span className="search-ico">🔍</span>
            <input className="inp search-inp" placeholder="Search username or business…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {filtered.length===0&&<div className="card empty-state"><div className="empty-ico">👥</div><div>No users</div></div>}
          {filtered.map(u=>{
            const usr=users[u]; const st=getStatus(u); const days=customDays[u]||30;
            const tagCls=st.active&&!st.trial?'tag-green':st.trial?'tag-amber':'tag-red';
            return(
              <div key={u} className="card" style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:14,marginBottom:2}}>{usr?.business||u}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>@{u} · {usr?.currency||'GHS'}</div>
                    {st.active&&!st.trial&&<div style={{fontSize:11,color:'var(--green)'}}>✅ Expires {new Date(st.paidUntil).toLocaleDateString()} ({st.daysLeft}d left)</div>}
                    {st.trial&&<div style={{fontSize:11,color:'var(--amber)'}}>🎁 Trial — {st.daysLeft}d left</div>}
                    {!st.active&&<div style={{fontSize:11,color:'var(--red)'}}>❌ Inactive</div>}
                  </div>
                  <span className={`tag ${tagCls}`}>{st.label?.toUpperCase()}</span>
                </div>
                <div style={{background:'var(--bg)',borderRadius:8,padding:10,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <input type="number" value={days} onChange={e=>setCustomDays(c=>({...c,[u]:parseInt(e.target.value)||30}))} style={{width:58,padding:'6px 8px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',fontSize:13,fontFamily:'var(--fd)'}} min="1"/>
                  <span style={{fontSize:10,color:'var(--text3)'}}>days</span>

                  {st.active&&<button className="btn-danger" style={{fontSize:10,marginLeft:'auto'}} onClick={()=>revoke(u)}>Revoke</button>}

            );
          })}

      )}

      {tab==='revenue'&&(
        <div>
          <div className="card">
            <div className="sec-title">Revenue by Plan</div>
            {Object.values(PLANS).map(pl=>{
              const count=paying.filter(u=>getStatus(u).plan===pl.id).length;
              return(
                <div key={pl.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border2)'}}>
                  <div><div style={{fontWeight:700}}>{pl.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{pl.label} × {count} users</div></div>
                  <div style={{fontFamily:'var(--fd)',fontWeight:800,color:'var(--accent)',fontSize:14}}>{fmtMoney(count*pl.price,'GH₵')}</div>
                </div>
              );
            })}
            <div style={{display:'flex',justifyContent:'space-between',padding:'14px 0',fontWeight:800,fontSize:16,borderTop:'2px solid var(--border)'}}>
              <span>Total Monthly</span><span style={{color:'var(--accent)',fontFamily:'var(--fd)'}}>GH₵{(revenue/100).toFixed(2)}</span>
            </div>
          </div>
          <div className="card">
            <div className="sec-title">MoMo Numbers</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div style={{background:'#f59e0b22',border:'1px solid #f59e0b44',borderRadius:8,padding:14,textAlign:'center'}}><div style={{fontSize:9,letterSpacing:2,color:'var(--amber)',fontWeight:700,marginBottom:4}}>MTN MOMO</div><div style={{fontSize:18,fontWeight:800,color:'var(--amber)',fontFamily:'var(--fd)'}}>{OWNER.mtn}</div></div>

function Dashboard({session,onLogout}){
  const [view,setView]=useState('dashboard');
  const [stores,setStores]=useState([]);
  const [products,setProducts]=useState([]);
  const [sales,setSales]=useState([]);
  const [customers,setCustomers]=useState([]);
  const [activeStore,setActiveStore]=useState(null);
  const [syncState,setSyncState]=useState('saved');
  const [loaded,setLoaded]=useState(false);
  const [storeModal,setStoreModal]=useState(false);
  const [shareMenu,setShareMenu]=useState(null);
  useEffect(()=>{_setShareMenu=setShareMenu;return()=>{_setShareMenu=null;};},[]);
  const saveTimer=useRef(null);
  const u=session.username;

  useEffect(()=>{
    async function init(){
      if(db)try{const snap=await db.collection('srp_data').doc(u).get();if(snap.exists){const d=snap.data();setStores(d.stores||[]);setProducts(d.products||[]);setSales(d.sales||[]);setCustomers(d.customers||[]);setCustomers(d.customers||[]);if(d.stores?.length>0)setActiveStore(d.stores[0].id);setLoaded(true);return;}}catch{}
      const local=lsGet(`srp-data-${u}`);
      if(local){setStores(local.stores||[]);setProducts(local.products||[]);setSales(local.sales||[]);setCustomers(local.customers||[]);if(local.stores?.length>0)setActiveStore(local.stores[0].id);}
      setLoaded(true);
    }
    init();
  },[u]);

  useEffect(()=>{
    if(!db||!loaded)return;
    const unsub=db.collection('srp_data').doc(u).onSnapshot(snap=>{if(snap.exists&&!snap.metadata.hasPendingWrites){const d=snap.data();setStores(d.stores||[]);setProducts(d.products||[]);setSales(d.sales||[]);setCustomers(d.customers||[]);}},()=>{});
    return unsub;
  },[u,loaded]);

  function doSave(st,pr,sa,cu){
    clearTimeout(saveTimer.current);setSyncState('saving');
    saveTimer.current=setTimeout(async()=>{await saveData(u,{stores:st,products:pr,sales:sa,customers:cu,updatedAt:Date.now()});setSyncState('saved');},1000);
  }
  function setS(fn){setStores(ss=>{const n=typeof fn==='function'?fn(ss):fn;doSave(n,products,sales,customers);if(n.length>0&&!activeStore)setActiveStore(n[0].id);return n;});}
  function setP(fn){setProducts(pp=>{const n=typeof fn==='function'?fn(pp):fn;doSave(stores,n,sales,customers);return n;});}
  function setSa(fn){setSales(ss=>{const n=typeof fn==='function'?fn(ss):fn;doSave(stores,products,n,customers);return n;});}
  function setCu(fn){setCustomers(cc=>{const n=typeof fn==='function'?fn(cc):fn;doSave(stores,products,sales,n);return n;});}

  const NAV=[
    {id:'dashboard',label:'Dashboard',ico:'📊'},
    {id:'sell',label:'New Sale',ico:'🛒'},
    {id:'products',label:'Products',ico:'📦'},
    {id:'history',label:'Sales',ico:'🧾'},
    {id:'reports',label:'Reports',ico:'📈'},
    {id:'stores',label:'Stores',ico:'🏪'},
    {id:'customers',label:'Customers',ico:'👥'},
    {id:'attendants',label:'Attendants',ico:'👤'},
    ...(session.isDev?[{id:'admin',label:'Admin',ico:'⚙️'}]:[]),
  ];

  const sc={saving:'var(--amber)',saved:'var(--green)',error:'var(--red)'}[syncState]||'var(--text3)';

  function handleAddStore(){setStoreModal(true);setView('stores');}

  if(!loaded)return<div className="loading"><div className="spinner"/><div style={{fontSize:10,letterSpacing:3,color:'var(--text3)'}}>LOADING DATA…</div></div>;

  // First time — prompt to add store
  if(stores.length===0&&loaded){
    return(
      <div className="auth-wrap">
        <div style={{width:'100%',maxWidth:400,textAlign:'center'}} className="fade-in">
          <div style={{fontSize:50,marginBottom:12}}>🏪</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>Welcome to StorePOS!</div>
          <div style={{fontSize:13,color:'var(--text3)',marginBottom:24}}>Add your first store to get started. You can add multiple store locations.</div>
          <StoreModal data={null} onSave={d=>{setS(ss=>[...ss,{...d,id:uid(),createdAt:Date.now()}]);}} onClose={()=>{}}/>
        </div>
      </div>
    );
  }

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sb-logo">
          <div style={{fontSize:28,marginBottom:6}}>📦</div>
          <div className="sb-logo-main">StorePOS</div>
          <div className="sb-logo-sub">{session.business}</div>
        </div>
        {stores.length>0&&(
          <div style={{padding:'8px 8px 0'}}>
            <StoreSelector stores={stores} activeStore={activeStore} setActiveStore={setActiveStore} onAdd={handleAddStore}/>
          </div>
        )}
        <div className="sb-nav">
          {NAV.map(n=>(
            <button key={n.id} className={`sb-item${view===n.id?' active':''}`} onClick={()=>setView(n.id)}>
              <span style={{fontSize:16}}>{n.ico}</span>{n.label}
              {session.isDev&&n.id==='admin'&&<span className="dev-pill">DEV</span>}
            </button>
          ))}
        </div>
        <div style={{marginTop:'auto',padding:'12px 8px',borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',marginBottom:4}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:sc}}/>
            <span style={{fontSize:11,color:'var(--text3)'}}>{syncState==='saving'?'Saving…':'Saved'}</span>
            <span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>{getSym(session.currency)}</span>
          </div>
          <button className="sb-item" style={{color:'var(--red)'}} onClick={onLogout}>
            <span style={{fontSize:16}}>🚪</span>Sign Out
          </button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0}}>
            <span style={{fontSize:20}}>{NAV.find(n=>n.id===view)?.ico}</span>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:800,fontSize:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{NAV.find(n=>n.id===view)?.label}</div>
              <div style={{fontSize:10,color:'var(--text3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{stores.find(s=>s.id===activeStore)?.name||session.business}</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            {stores.length>1&&(
              <div style={{maxWidth:130}}>
                <StoreSelector stores={stores} activeStore={activeStore} setActiveStore={setActiveStore} onAdd={handleAddStore}/>
              </div>
            )}
            <div style={{width:7,height:7,borderRadius:'50%',background:sc}}/>
            <button className="hide-mob" style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:12,fontFamily:'var(--fm)',fontWeight:600}} onClick={onLogout}>Sign Out</button>
          </div>
        </div>
        <div className="content">
          <div className="fade-in">
            {view==='dashboard'&&<VDash stores={stores} products={products} sales={sales} customers={customers} session={session} setView={setView} activeStore={activeStore}/>}
            {view==='sell'&&<VSell products={products} setSales={setSa} setProducts={setP} session={session} activeStore={activeStore} stores={stores} customers={customers}/>}
            {view==='products'&&<VProducts stores={stores} products={products} setProducts={setP} session={session} activeStore={activeStore}/>}
            {view==='history'&&<VSalesHistory sales={sales} products={products} session={session} setSales={setSa} activeStore={activeStore} stores={stores} customers={customers}/>}
            {view==='reports'&&<VReports sales={sales} products={products} session={session} activeStore={activeStore}/>}
            {view==='stores'&&<VStores stores={stores} setStores={setS} products={products} sales={sales} session={session}/>}
            {view==='customers'&&<VCustomers customers={customers} setCustomers={setCu} sales={sales} stores={stores} session={session} activeStore={activeStore} setView={setView}/>}
            {view==='attendants'&&<VAttendants stores={stores} session={session} activeStore={activeStore}/>}
            {view==='admin'&&session.isDev&&<VAdmin/>}
          </div>
        </div>
      </div>

      <MobileNav NAV={NAV} view={view} setView={setView} onLogout={onLogout} session={session} syncState={syncState}/>
      {shareMenu&&<ShareMenu txt={shareMenu.txt} customerPhone={shareMenu.phone} customerEmail={shareMenu.email} onClose={()=>setShareMenu(null)}/>}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [ready,setReady]=useState(false);
  const [installPrompt,setInstallPrompt]=useState(null);
  const [showInstall,setShowInstall]=useState(false);

  useEffect(()=>{
    const handler=e=>{e.preventDefault();setInstallPrompt(e);setShowInstall(true);};
    window.addEventListener('beforeinstallprompt',handler);
    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  function doInstall(){
    if(installPrompt){installPrompt.prompt();installPrompt.userChoice.then(()=>{setInstallPrompt(null);setShowInstall(false);});}
  }

  const [mode,setMode]=useState('owner'); // 'owner' | 'attendant'
  const [attSession,setAttSession]=useState(null);

  useEffect(()=>{
    const users=lsGet('srp-users')||{};
    users[DEV_U]={hash:hashStr(DEV_P),business:'AMIN MOTORS & TRANSPORT',currency:'GHS',isDev:true,created:0};
    lsSet('srp-users',users);
    const s=lsGet('srp-session');
    if(s?.username)setSession(s);
    const as=getAttendantSession();
    if(as?.username&&as?.isAttendant)setAttSession(as);
    setReady(true);
  },[]);

  async function login(s){
    setSession(s);lsSet('srp-session',s);
    if(!s.isDev){
      if(db)try{const doc=await db.collection('srp_subscriptions').doc(s.username).get();if(doc.exists)lsSet(`srp-sub-${s.username}`,doc.data());}catch{}
      if(!getSub(s.username))startTrial(s.username);
    }
  }
  function logout(){setSession(null);lsSet('srp-session',null);window.location.reload();}
  function attLogin(s){setAttSession(s);setAttendantSession(s);}
  function attLogout(){setAttSession(null);clearAttendantSession();window.location.reload();}

  const InstallBanner=showInstall&&!session?(
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'linear-gradient(135deg,#f97316,#ea580c)',padding:'12px 16px',zIndex:200,display:'flex',alignItems:'center',gap:12,boxShadow:'0 -4px 20px #f9731644'}}>
      <span style={{fontSize:24}}>🏪</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:13,color:'#0a0a0f'}}>Install StorePOS</div>
        <div style={{fontSize:11,color:'rgba(0,0,0,.6)'}}>Add to home screen for best experience</div>
      </div>
      <button onClick={doInstall} style={{background:'#0a0a0f',color:'var(--accent)',border:'none',borderRadius:8,padding:'8px 16px',fontFamily:'var(--fm)',fontWeight:800,fontSize:12,cursor:'pointer',flexShrink:0}}>Install</button>
      <button onClick={()=>setShowInstall(false)} style={{background:'none',border:'none',color:'rgba(0,0,0,.5)',cursor:'pointer',fontSize:18,padding:'0 4px'}}>✕</button>
    </div>
  ):null;

  if(!ready)return<div className="loading"><div className="spinner"/></div>;

  // Attendant mode
  if(mode==='attendant'||attSession?.isAttendant){
    if(!attSession)return<AttendantLogin onLogin={attLogin}/>;
    return<AttendantDashboard session={attSession} onLogout={attLogout}/>;
  }

  // Owner mode
  if(!session){
    return(
      <div>
        {InstallBanner}
        <Auth onLogin={login}/>
        <div style={{position:'fixed',bottom:showInstall?80:20,left:0,right:0,textAlign:'center'}}>
          <button onClick={()=>setMode('attendant')} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text2)',padding:'10px 20px',cursor:'pointer',fontFamily:'var(--fm)',fontSize:12,fontWeight:600}}>
            👤 Attendant Login →
          </button>
        </div>
      </div>
    );
  }
  const status=subStatus(session.username);
  if(!status.active)return<SubWall username={session.username} onActivated={()=>setSession({...lsGet('srp-session')})} />;
  return<Dashboard session={session} onLogout={logout}/>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
