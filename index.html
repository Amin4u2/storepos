<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" id="favicon-icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f97316'/><text y='72' x='50' text-anchor='middle' font-size='65'>🏪</text></svg>"/>

<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;
  --accent:#f97316;--accent2:#ea580c;--accent3:#fb923c;
  --blue:#6366f1;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --text:#f1f0ee;--text2:#9998a8;--text3:#48475a;
  --border:#1e1e2e;--border2:#16161f;
  --fm:'Syne',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --fd:'JetBrains Mono','Courier New',monospace;
  --nh:62px;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--fm);min-height:100vh;min-height:100dvh;overflow-x:hidden;font-size:15px;line-height:1.5;}
input,select,button,textarea{font-family:var(--fm);}

/* ── Layout ───────────────────────────────────────────────── */
.app{display:flex;height:100vh;height:100dvh;overflow:hidden;}
.sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;overscroll-behavior-y:auto;scroll-padding-bottom:100px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;gap:10px;}

/* ── Sidebar ──────────────────────────────────────────────── */
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sb-logo-main{font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.sb-logo-sub{font-size:9px;letter-spacing:3px;color:var(--text3);margin-top:3px;text-transform:uppercase;}
.sb-nav{padding:8px;}
.sb-sec{font-size:8px;letter-spacing:3px;color:var(--text3);padding:12px 10px 4px;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .15s;border:none;background:none;width:100%;text-align:left;min-height:44px;touch-action:manipulation;}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:#f9731618;color:var(--accent);}
.dev-pill{font-size:7px;background:var(--accent);color:#0a0a0f;padding:2px 5px;border-radius:3px;font-weight:800;letter-spacing:1px;margin-left:auto;}

/* ── Bottom nav ───────────────────────────────────────────── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:50;padding-bottom:env(safe-area-inset-bottom,0px);}
.bn-inner{display:flex;height:var(--nh);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:9px;letter-spacing:.5px;text-transform:uppercase;border:none;background:none;font-family:var(--fm);font-weight:700;min-height:44px;touch-action:manipulation;padding:0 2px;}
.bn-item.active{color:var(--accent);}
.bn-item span:first-child{font-size:20px;}

/* ── Cards ────────────────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.sec-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:12px;}

/* ── Stats ────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.4;}
.stat-label{font-size:10px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;font-weight:700;}
.stat-val{font-family:var(--fd);font-size:20px;font-weight:600;line-height:1.2;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* ── Buttons ──────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;background:var(--accent);color:#0a0a0f;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--fm);touch-action:manipulation;letter-spacing:.3px;min-height:44px;}
.btn:hover{background:var(--accent2);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn:active{transform:scale(.98);}
.btn-outline{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--fm);touch-action:manipulation;min-height:44px;}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-outline:active{transform:scale(.98);}
.btn-green{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;background:var(--green);color:#0a0a0f;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fm);touch-action:manipulation;min-height:44px;}
.btn-green:active{transform:scale(.98);}
.btn-sm{padding:6px 12px;font-size:11px;letter-spacing:.3px;background:transparent;color:var(--accent);border:1px solid #f9731644;border-radius:5px;cursor:pointer;font-family:var(--fm);touch-action:manipulation;min-height:36px;display:inline-flex;align-items:center;}
.btn-danger{padding:6px 12px;font-size:11px;background:transparent;color:var(--red);border:1px solid #ef444444;border-radius:5px;cursor:pointer;font-family:var(--fm);touch-action:manipulation;min-height:36px;display:inline-flex;align-items:center;}
.btn-blue{padding:6px 12px;font-size:11px;background:transparent;color:var(--blue);border:1px solid #6366f144;border-radius:5px;cursor:pointer;font-family:var(--fm);touch-action:manipulation;min-height:36px;display:inline-flex;align-items:center;}

/* ── Inputs ───────────────────────────────────────────────── */
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:11px 13px;color:var(--text);font-size:16px;font-family:var(--fm);outline:none;transition:border .15s;-webkit-appearance:none;appearance:none;line-height:1.4;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--text3);}
.sel{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:11px 13px;color:var(--text);font-size:16px;font-family:var(--fm);outline:none;-webkit-appearance:none;appearance:none;line-height:1.4;}
.sel:focus{border-color:var(--accent);}
.lbl{font-size:11px;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase;font-weight:700;display:block;margin-bottom:7px;}
.field{margin-bottom:16px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── Auth ─────────────────────────────────────────────────── */
.auth-wrap{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;background:radial-gradient(ellipse at 50% 0%,#f9731608 0%,transparent 60%);}
.auth-box{width:100%;max-width:400px;}
.auth-logo{font-size:36px;font-weight:800;color:var(--accent);letter-spacing:-1px;margin-bottom:4px;text-align:center;}
.auth-tagline{font-size:9px;letter-spacing:4px;color:var(--text3);margin-bottom:32px;text-align:center;text-transform:uppercase;}
.auth-tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;border-radius:6px;cursor:pointer;border:none;background:none;color:var(--text2);font-family:var(--fm);transition:all .15s;min-height:44px;}
.auth-tab.active{background:var(--accent);color:#0a0a0f;}

/* ── Notices ──────────────────────────────────────────────── */
.notice{padding:11px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;line-height:1.6;}
.notice-ok{background:#22c55e11;border:1px solid #22c55e33;color:var(--green);}
.notice-err{background:#ef444411;border:1px solid #ef444433;color:var(--red);}
.notice-warn{background:#f59e0b11;border:1px solid #f59e0b33;color:var(--amber);}
.notice-blue{background:#6366f111;border:1px solid #6366f133;color:var(--blue);}
.notice-orange{background:#f9731611;border:1px solid #f9731633;color:var(--accent);}

/* ── Tags ─────────────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;font-size:9px;padding:3px 8px;border-radius:99px;font-weight:700;letter-spacing:.5px;}
.tag-green{background:#22c55e22;color:var(--green);border:1px solid #22c55e44;}
.tag-red{background:#ef444422;color:var(--red);border:1px solid #ef444444;}
.tag-amber{background:#f59e0b22;color:var(--amber);border:1px solid #f59e0b44;}
.tag-blue{background:#6366f122;color:var(--blue);border:1px solid #6366f144;}
.tag-orange{background:#f9731622;color:var(--accent);border:1px solid #f9731644;}
.tag-grey{background:#48475a22;color:var(--text3);border:1px solid #48475a44;}

/* ── Modal ────────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:#000000cc;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overscroll-behavior:contain;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg2);z-index:1;flex-shrink:0;}
.modal-hdr span{font-size:15px;font-weight:800;}
.modal-body{padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;flex:1;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 20px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;}

/* ── Plan card ────────────────────────────────────────────── */
.plan-card{cursor:pointer;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:16px 12px;text-align:center;transition:all .2s;touch-action:manipulation;}
.plan-card.sel{background:var(--bg3);border-color:var(--accent);}

/* ── Empty state ──────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-ico{font-size:48px;margin-bottom:14px;}

/* ── Loading ──────────────────────────────────────────────── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;gap:12px;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .25s ease;}

/* ── Stock bar ────────────────────────────────────────────── */
.stock-bar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:5px;}
.stock-fill{height:100%;border-radius:3px;transition:width .4s;}

/* ── Product grid ─────────────────────────────────────────── */
.prod-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:border .15s;}
.prod-card:hover{border-color:var(--accent);}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:14px;}

/* ── Sale item ────────────────────────────────────────────── */
.sale-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px;}

/* ── Search ───────────────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:14px;}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);}
.search-inp{padding-left:38px;}

/* ── Report tabs ──────────────────────────────────────────── */
.rtabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.rtab{padding:8px 14px;font-size:11px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);font-family:var(--fm);font-weight:700;transition:all .15s;min-height:36px;touch-action:manipulation;}
.rtab.active{background:var(--accent);color:#0a0a0f;border-color:var(--accent);}

/* ── Store selector ───────────────────────────────────────── */
.store-sel{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);min-height:38px;touch-action:manipulation;}
.store-sel:hover{border-color:var(--accent);color:var(--accent);}

/* ── Mobile overrides ─────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none;}
  .bottom-nav{display:block;}

  /* Content — CRITICAL: enough space so last item is never under nav bar */
  .content{
    padding:12px 12px;
    padding-bottom:calc(var(--nh) + env(safe-area-inset-bottom,0px) + 100px) !important;
    overscroll-behavior-y:auto;
  }

  /* Topbar */
  .topbar{padding:0 12px;height:48px;}
  .hide-mob{display:none;}

  /* Typography scale up for readability */
  .lbl{font-size:12px;letter-spacing:1px;margin-bottom:8px;}
  .sec-title{font-size:10px;margin-bottom:14px;}
  .stat-label{font-size:11px;}
  .stat-val{font-size:18px;}
  .stat-sub{font-size:12px;}

  /* Forms stack single column */
  .form-grid{grid-template-columns:1fr;}

  /* Stats always 2 col */
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px;}

  /* Cards */
  .card{padding:14px;margin-bottom:10px;}

  /* Products 2 col */
  .prod-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .prod-card{padding:12px;}

  /* Modals slide up from bottom */
  .modal-ov{padding:0;align-items:flex-end;}
  .modal-box{
    max-width:100%;
    max-height:94dvh;
    border-radius:20px 20px 0 0;
    border-bottom:none;
    display:flex;
    flex-direction:column;
  }
  .modal-hdr{padding:16px 16px 12px;border-radius:20px 20px 0 0;flex-shrink:0;}
  .modal-body{padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
  .modal-foot{padding:14px 16px;gap:8px;flex-shrink:0;}
  .modal-foot .btn,
  .modal-foot .btn-outline{flex:1;justify-content:center;padding:14px;}

  /* Buttons full tap targets */
  .btn{min-height:46px;font-size:14px;}
  .btn-outline{min-height:46px;font-size:14px;}
  .btn-green{min-height:46px;font-size:14px;}
  .btn-sm{min-height:38px;font-size:11px;}
  .btn-danger{min-height:38px;font-size:11px;}
  .btn-blue{min-height:38px;font-size:11px;}

  /* Inputs — 16px prevents iOS zoom */
  .inp{font-size:16px;padding:12px 14px;}
  .sel{font-size:16px;padding:12px 14px;}

  /* Auth page */
  .auth-logo{font-size:32px;}
  .auth-tagline{font-size:9px;letter-spacing:3px;}

  /* Bottom nav items */
  .bn-item{font-size:9px;}
  .bn-item span:first-child{font-size:22px;}

  /* Plan cards */
  .plan-card{padding:12px 8px;}

  /* Notices */
  .notice{font-size:12px;padding:10px 12px;}

  /* Tags */
  .tag{font-size:9px;}

  /* Report tabs scrollable */
  .rtabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
  .rtab{white-space:nowrap;flex-shrink:0;}

  /* Store selector in topbar */
  .store-sel{padding:6px 10px;font-size:11px;}
}

@media(max-width:380px){
  .prod-grid{grid-template-columns:repeat(2,1fr);}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .stat-val{font-size:16px;}
  .content{padding:10px;}
}
</style>
</head>

<script>
function makeIcon(size){
  const c=document.createElement('canvas');c.width=c.height=size;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#f97316';ctx.beginPath();ctx.arc(size/2,size/2,size*.44,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0a0a0f';ctx.beginPath();ctx.arc(size/2,size/2,size*.36,0,Math.PI*2);ctx.fill();
  ctx.font=`${size*.34}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🏪',size/2,size/2+size*.03);
  return c.toDataURL('image/png');
}
const i192=makeIcon(192),i512=makeIcon(512);
document.getElementById('apple-icon').href=i192;
document.getElementById('favicon-icon').href=i192;

document.getElementById('pwa-manifest').href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(mf));
</script>

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const VEHICLE_TYPES=['Car','Truck','Bus','Motorbike','Tractor','Generator','Boat','Other'];
const REMINDER_CYCLES=[
  {days:7,label:'Every week'},
  {days:14,label:'Every 2 weeks'},
  {days:30,label:'Monthly'},
  {days:45,label:'Every 45 days'},
  {days:60,label:'Every 2 months'},
  {days:90,label:'Every 3 months'},
  {days:180,label:'Every 6 months'},
  {days:365,label:'Yearly'},
];
const ROLES={owner:'owner',attendant:'attendant'};

// ── Helpers ────────────────────────────────────────────────────
const lsGet=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const hashStr=s=>{let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h.toString(36);};
const fmtDate=d=>{if(!d)return'—';try{return new Date(d).toLocaleDateString('en-GH',{day:'numeric',month:'short',year:'numeric'});}catch{return d;}};
const fmtMoney=(n,sym='GH₵')=>`${sym}${Number(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const getSym=cur=>CURRENCIES.find(c=>c.code===cur)?.symbol||cur;

// ── Customer helpers ──────────────────────────────────────────
const fmtDaysFromNow=d=>{const diff=Math.ceil((new Date(d)-new Date())/86400000);if(diff<0)return`${Math.abs(diff)}d overdue`;if(diff===0)return'Due today';return`Due in ${diff}d`;};
const isDue=d=>new Date(d)<=new Date(new Date().setDate(new Date().getDate()+7));
const isOverdue=d=>new Date(d)<new Date();

// ── Sub helpers ────────────────────────────────────────────────
// ── Attendant helpers ─────────────────────────────────────────
const getAttendants=async(ownerUser)=>{
  if(db)try{const d=await db.collection('srp_attendants').doc(ownerUser).get();if(d.exists)return d.data().list||[];}catch{}
  return lsGet(`srp-att-${ownerUser}`)||[];
};
const saveAttendants=async(ownerUser,list)=>{
  lsSet(`srp-att-${ownerUser}`,list);
  if(db)try{await db.collection('srp_attendants').doc(ownerUser).set({list});}catch{}
};
const getAttendantSession=()=>lsGet('srp-att-session');
const setAttendantSession=s=>lsSet('srp-att-session',s);
const clearAttendantSession=()=>localStorage.removeItem('srp-att-session');
const hashStr2=s=>{let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h.toString(36);};

// ── Subscription system — Firestore-backed ────────────────────
const getSub=u=>lsGet(`srp-sub-${u}`);
const setSub=(u,d)=>{
  lsSet(`srp-sub-${u}`,d);
  // Also save to Firestore so admin activation works cross-device
  if(db)try{db.collection('srp_subscriptions').doc(u).set({...d,updatedAt:Date.now()});}catch{}
};

// Load sub from Firestore and cache locally
const loadSubFromFirestore=async(u)=>{
  if(!db)return null;
  try{
    const doc=await db.collection('srp_subscriptions').doc(u).get();
    if(doc.exists){
      const data=doc.data();
      lsSet(`srp-sub-${u}`,data); // cache locally
      return data;
    }
  }catch{}
  return null;
};

const subStatus=u=>{
  if(u===DEV_U)return{active:true,trial:false,plan:'premium',unlimited:true};
  const s=getSub(u);if(!s)return{active:false,trial:false,expired:true};
  const now=Date.now();
  if(s.trialEnd&&now<s.trialEnd&&!s.paid)return{active:true,trial:true,daysLeft:Math.ceil((s.trialEnd-now)/86400000),plan:s.plan};
  if(s.paid&&s.paidUntil&&now<s.paidUntil)return{active:true,trial:false,plan:s.plan,paidUntil:s.paidUntil};
  return{active:false,trial:false,expired:true,plan:s.plan};
};
const startTrial=u=>{
  if(!getSub(u)){
    const trial={plan:'standard',trialEnd:Date.now()+TRIAL_DAYS*86400000,paid:false,created:Date.now()};
    setSub(u,trial); // setSub now also saves to Firestore
  }
};

// ── Firebase helpers ───────────────────────────────────────────
const getUsers=async()=>{
  if(db)try{const d=await db.collection('srp_users').doc('index').get();if(d.exists)return d.data().users||{};}catch{}
  return lsGet('srp-users')||{};
};
const saveUsers=async u=>{lsSet('srp-users',u);if(db)try{await db.collection('srp_users').doc('index').set({users:u});}catch{}};
const saveData=async(u,data)=>{lsSet(`srp-data-${u}`,data);if(db)try{await db.collection('srp_data').doc(u).set(data);}catch{}};
const loadData=async u=>{
  if(db)try{const d=await db.collection('srp_data').doc(u).get();if(d.exists)return d.data();}catch{}
  return lsGet(`srp-data-${u}`)||null;
};

// ── ATTENDANT LOGIN ────────────────────────────────────────────
function AttendantLogin({onLogin}){
  const [ownerUser,setOwnerUser]=useState('');
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);

  async function doLogin(){
    setErr('');setBusy(true);
    const atts=await getAttendants(ownerUser.toLowerCase().trim());
    const att=atts.find(a=>a.pin===hashStr2(pin)&&a.active);
    if(!att){setErr('Invalid owner username or PIN.');setBusy(false);return;}
    const users=await getUsers();
    const owner=users[ownerUser.toLowerCase().trim()];
    if(!owner){setErr('Owner not found.');setBusy(false);return;}
    const sess={
      username:ownerUser.toLowerCase().trim(),
      business:owner.business,
      currency:owner.currency||'GHS',
      isDev:false,
      isAttendant:true,
      attendantName:att.name,
      attendantId:att.id,
      storeId:att.storeId,
    };
    setAttendantSession(sess);onLogin(sess);setBusy(false);
  }

  return(
    <div className="auth-wrap">
      <div className="auth-box fade-in">
        <div className="auth-logo">📦 StorePOS</div>
        <div className="auth-tagline">SHOP ATTENDANT LOGIN</div>
        <div className="notice notice-blue" style={{textAlign:'center',fontSize:12}}>
          👤 Enter your owner's username and your PIN to start recording sales.
        </div>
        {err&&<div className="notice notice-err">{err}</div>}
        <div className="field"><label className="lbl">Owner Username</label>
          <input className="inp" value={ownerUser} onChange={e=>setOwnerUser(e.target.value)} placeholder="owner_username" autoCapitalize="none"/>
        </div>
        <div className="field"><label className="lbl">Your PIN</label>
          <input className="inp" type="password" inputMode="numeric" maxLength={6} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,''))} onKeyDown={e=>e.key==='Enter'&&doLogin()} placeholder="••••"/>
        </div>
        <button className="btn" style={{width:'100%',justifyContent:'center',padding:'13px',fontSize:14}} onClick={doLogin} disabled={busy}>
          {busy?'Checking…':'Sign In as Attendant →'}
        </button>
        <p style={{textAlign:'center',fontSize:11,color:'var(--text3)',marginTop:14}}>
          Owner? <span style={{color:'var(--accent)',cursor:'pointer'}} onClick={()=>window.location.reload()}>Sign in here →</span>
        </p>
      </div>
    </div>
  );
}

// ── ATTENDANT DASHBOARD ─────────────────────────────────────────
function AttendantDashboard({session,onLogout}){
  const [products,setProducts]=useState([]);
  const [sales,setSales]=useState([]);
  const [stores,setStores]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [syncState,setSyncState]=useState('saved');
  const [view,setView]=useState('sell');
  const saveTimer=useRef(null);
  const sym=getSym(session.currency);
  const u=session.username;

  useEffect(()=>{
    async function init(){
      if(db)try{const snap=await db.collection('srp_data').doc(u).get();if(snap.exists){const d=snap.data();setProducts(d.products||[]);setSales(d.sales||[]);setStores(d.stores||[]);setLoaded(true);return;}}catch{}
      const local=lsGet(`srp-data-${u}`);
      if(local){setProducts(local.products||[]);setSales(local.sales||[]);setStores(local.stores||[]);}
      setLoaded(true);
    }
    init();
  },[u]);

  useEffect(()=>{
    if(!db||!loaded)return;
    const unsub=db.collection('srp_data').doc(u).onSnapshot(snap=>{
      if(snap.exists&&!snap.metadata.hasPendingWrites){
        const d=snap.data();setProducts(d.products||[]);setSales(d.sales||[]);setStores(d.stores||[]);
      }
    },()=>{});
    return unsub;
  },[u,loaded]);

  function doSave(pr,sa){
    clearTimeout(saveTimer.current);setSyncState('saving');
    saveTimer.current=setTimeout(async()=>{
      const local=lsGet(`srp-data-${u}`)||{};
      await saveData(u,{...local,products:pr,sales:sa,updatedAt:Date.now()});
      setSyncState('saved');
    },1000);
  }
  function setP(fn){setProducts(pp=>{const n=typeof fn==='function'?fn(pp):fn;doSave(n,sales);return n;});}
  function setSa(fn){setSales(ss=>{const n=typeof fn==='function'?fn(ss):fn;doSave(products,n);return n;});}

  const todaySales=sales.filter(s=>s.storeId===session.storeId&&s.date===today()&&s.attendantId===session.attendantId);
  const todayTotal=todaySales.reduce((t,s)=>t+s.total,0);
  const sc={saving:'var(--amber)',saved:'var(--green)'}[syncState]||'var(--text3)';

  if(!loaded)return<div className="loading"><div className="spinner"/></div>;

  return(
    <div className="app" style={{flexDirection:'column'}}>
      {/* Attendant topbar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 14px',height:50,background:'var(--bg2)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:20}}>📦</span>
          <div>
            <div style={{fontWeight:800,fontSize:12,color:'var(--accent)'}}>StorePOS</div>
            <div style={{fontSize:10,color:'var(--text3)'}}>👤 {session.attendantName}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:10,color:'var(--text3)'}}>Today's Sales</div>
            <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:13,color:'var(--green)'}}>{fmtMoney(todayTotal,sym)}</div>
          </div>
          <div style={{width:7,height:7,borderRadius:'50%',background:sc}}/>
          <button onClick={onLogout} style={{background:'#ef444411',border:'1px solid #ef444433',borderRadius:6,color:'var(--red)',padding:'5px 10px',fontSize:11,cursor:'pointer',fontFamily:'var(--fm)',fontWeight:700}}>Exit</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg2)',flexShrink:0}}>
        {[['sell','🛒 New Sale'],['mytotals','📊 My Today']].map(([id,l])=>(
          <button key={id} onClick={()=>setView(id)} style={{flex:1,padding:'12px 8px',border:'none',background:'none',color:view===id?'var(--accent)':'var(--text3)',fontFamily:'var(--fm)',fontWeight:700,fontSize:12,cursor:'pointer',borderBottom:`2px solid ${view===id?'var(--accent)':'transparent'}`}}>{l}</button>
        ))}
      </div>

      <div style={{flex:1,overflowY:'auto',padding:12,paddingBottom:20}}>
        {view==='sell'&&(
          <VSell
            products={products} setSales={fn=>{setSa(ss=>{const prev=typeof fn==='function'?fn(ss):fn;return prev.map(s=>!s.attendantId?{...s,attendantId:session.attendantId,attendantName:session.attendantName}:s);})}}
            setProducts={setP} session={session} activeStore={session.storeId} stores={stores}
          />
        )}
        {view==='mytotals'&&(
          <div>
            <div className="stats-grid">
              <div className="stat-card"><div className="stat-label">My Sales Today</div><div className="stat-val" style={{color:'var(--accent)',fontSize:18}}>{fmtMoney(todayTotal,sym)}</div><div className="stat-sub">{todaySales.length} transactions</div></div>
              <div className="stat-card"><div className="stat-label">Profit Generated</div><div className="stat-val" style={{color:'var(--green)',fontSize:18}}>{fmtMoney(todaySales.reduce((t,s)=>t+s.profit,0),sym)}</div></div>
            </div>
            <div className="card">
              <div className="sec-title">My Sales — {new Date().toLocaleDateString('en-GH',{weekday:'long',day:'numeric',month:'long'})}</div>
              {todaySales.length===0?<div style={{fontSize:12,color:'var(--text3)'}}>No sales recorded yet today.</div>
                :todaySales.slice().sort((a,b)=>b.createdAt-a.createdAt).map(s=>(
                  <div key={s.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border2)'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{s.items?.length||0} item{s.items?.length!==1?'s':''}  {s.customer?`— ${s.customer}`:''}</div>
                      <div style={{fontSize:10,color:'var(--text3)'}}>{new Date(s.createdAt).toLocaleTimeString('en-GH',{hour:'2-digit',minute:'2-digit'})} · {s.payMethod}</div>
                    </div>
                    <div style={{fontFamily:'var(--fd)',fontWeight:700,color:'var(--accent)',fontSize:13}}>{fmtMoney(s.total,sym)}</div>
                  </div>
                ))
              }
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── AUTH ───────────────────────────────────────────────────────
function Auth({onLogin}){
  const [tab,setTab]=useState('signin');
  const [f,setF]=useState({u:'',p:'',c:'',b:'',currency:'GHS'});
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));

  async function doSignIn(){
    setErr('');setBusy(true);
    const users=await getUsers();
    const ukey=f.u.toLowerCase().trim();
    if(!users[ukey]){setErr('Account not found.');setBusy(false);return;}
    if(users[ukey].hash!==hashStr(f.p)){setErr('Wrong password.');setBusy(false);return;}
    const sess={username:ukey,business:users[ukey].business,currency:users[ukey].currency||'GHS',isDev:!!users[ukey].isDev};
    lsSet('srp-session',sess);onLogin(sess);setBusy(false);
  }
  async function doSignUp(){
    setErr('');setBusy(true);
    const ukey=f.u.toLowerCase().trim();
    if(!ukey||!f.p||!f.b.trim()){setErr('All fields required.');setBusy(false);return;}
    if(f.p.length<6){setErr('Password min 6 chars.');setBusy(false);return;}
    if(f.p!==f.c){setErr('Passwords do not match.');setBusy(false);return;}
    const users=await getUsers();
    if(users[ukey]){setErr('Username taken.');setBusy(false);return;}
    users[ukey]={hash:hashStr(f.p),business:f.b.trim(),currency:f.currency,isDev:false,created:Date.now()};
    await saveUsers(users);
    const sess={username:ukey,business:f.b.trim(),currency:f.currency,isDev:false};
    lsSet('srp-session',sess);onLogin(sess);setBusy(false);
  }

  return(
    <div className="auth-wrap">
      <div className="auth-box fade-in">
        <div className="auth-logo">📦 StorePOS</div>
        <div className="auth-tagline">MULTI-STORE INVENTORY & SALES MANAGER</div>
        <div className="auth-tabs">
          {[['signin','Sign In'],['signup','Sign Up']].map(([t,l])=>(
            <button key={t} className={`auth-tab${tab===t?' active':''}`} onClick={()=>{setTab(t);setErr('')}}>{l}</button>
          ))}
        </div>
        {err&&<div className="notice notice-err">{err}</div>}
        <div className="field"><label className="lbl">Username</label>
          <input className="inp" value={f.u} onChange={e=>sv('u',e.target.value)} onKeyDown={e=>e.key==='Enter'&&(tab==='signin'?doSignIn():doSignUp())} placeholder="your_username" autoCapitalize="none"/>
        </div>
        {tab==='signup'&&<>
          <div className="field"><label className="lbl">Business / Store Name</label>
            <input className="inp" value={f.b} onChange={e=>sv('b',e.target.value)} placeholder="e.g. Mensah Provision Store"/>
          </div>
          <div className="field"><label className="lbl">Currency</label>
            <select className="sel" value={f.currency} onChange={e=>sv('currency',e.target.value)}>
              {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.symbol} — {c.name} ({c.code})</option>)}
            </select>
          </div>
        </>}
        <div className="field"><label className="lbl">Password</label>
          <input className="inp" type="password" value={f.p} onChange={e=>sv('p',e.target.value)} onKeyDown={e=>e.key==='Enter'&&(tab==='signin'?doSignIn():doSignUp())} placeholder="••••••••"/>
        </div>
        {tab==='signup'&&<div className="field"><label className="lbl">Confirm Password</label>
          <input className="inp" type="password" value={f.c} onChange={e=>sv('c',e.target.value)} placeholder="••••••••"/>
        </div>}
        <button className="btn" style={{width:'100%',justifyContent:'center',padding:'13px',fontSize:14}} onClick={tab==='signin'?doSignIn:doSignUp} disabled={busy}>
          {busy?'Please wait…':tab==='signin'?'Sign In →':'Create Account →'}
        </button>
        <div style={{marginTop:20,fontSize:10,color:'var(--text3)',letterSpacing:2,textAlign:'center',opacity:.4}}>STOREPOS.WEB.APP</div>
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────
function VDash({stores,products,sales,customers,session,setView,activeStore}){
  const sym=getSym(session.currency);
  const storeProd=products.filter(p=>p.storeId===activeStore);
  const storeSales=sales.filter(s=>s.storeId===activeStore);
  const now=new Date();
  const todaySales=storeSales.filter(s=>s.date===today());
  const monthSales=storeSales.filter(s=>{const d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const todayRev=todaySales.reduce((t,s)=>t+s.total,0);
  const todayProfit=todaySales.reduce((t,s)=>t+s.profit,0);
  const monthRev=monthSales.reduce((t,s)=>t+s.total,0);
  const lowStock=storeProd.filter(p=>p.stock<=p.lowStockAlert&&p.stock>0);
  const outOfStock=storeProd.filter(p=>p.stock===0);
  const totalStockValue=storeProd.reduce((t,p)=>t+(p.buyPrice*p.stock),0);

  return(
    <div>
      {outOfStock.length>0&&(
        <div className="notice notice-err" style={{display:'flex',alignItems:'center',gap:8}}>
          <span>🚨</span>
          <span style={{flex:1}}><strong>{outOfStock.length}</strong> product{outOfStock.length!==1?'s':''} out of stock!</span>
          <button className="btn-sm" style={{fontSize:10}} onClick={()=>setView('products')}>View →</button>
        </div>
      )}
      {lowStock.length>0&&(
        <div className="notice notice-warn" style={{display:'flex',alignItems:'center',gap:8}}>
          <span>⚠️</span>
          <span style={{flex:1}}><strong>{lowStock.length}</strong> product{lowStock.length!==1?'s':''} running low on stock</span>
          <button className="btn-sm" style={{fontSize:10,color:'var(--amber)',borderColor:'#f59e0b44'}} onClick={()=>setView('products')}>View →</button>
        </div>
      )}
      <div className="stats-grid">
        <div className="stat-card" style={{borderTop:'2px solid var(--accent)'}}>
          <div className="stat-label" style={{color:'var(--accent)'}}>Today's Sales</div>
          <div className="stat-val" style={{color:'var(--accent)',fontSize:18}}>{fmtMoney(todayRev,sym)}</div>
          <div className="stat-sub">{todaySales.length} transaction{todaySales.length!==1?'s':''}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Today's Profit</div>
          <div className="stat-val" style={{color:'var(--green)',fontSize:18}}>{fmtMoney(todayProfit,sym)}</div>
          <div className="stat-sub">margin {todayRev>0?Math.round(todayProfit/todayRev*100):0}%</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">This Month</div>
          <div className="stat-val" style={{fontSize:16}}>{fmtMoney(monthRev,sym)}</div>
          <div className="stat-sub">{monthSales.length} sales</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Stock Value</div>
          <div className="stat-val" style={{fontSize:16}}>{fmtMoney(totalStockValue,sym)}</div>
          <div className="stat-sub">{storeProd.length} products</div>
        </div>
      </div>

      {/* Quick sell button */}
      {(()=>{
        const due=customers.filter(c=>c.storeId===activeStore&&(c.reminders||[]).some(r=>isDue(r.nextDate)||isOverdue(r.nextDate)));
        if(due.length===0)return null;
        return<div className="notice notice-warn" style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
          <span>🔔</span>
          <span style={{flex:1}}><strong>{due.length}</strong> customer{due.length!==1?'s':''} due for follow-up</span>
          <button className="btn-sm" style={{fontSize:10,color:'var(--amber)',borderColor:'#f59e0b44'}} onClick={()=>setView('customers')}>View →</button>
        </div>;
      })()}
      <button className="btn" style={{width:'100%',justifyContent:'center',padding:14,fontSize:14,marginBottom:14}} onClick={()=>setView('sell')}>
        🛒 New Sale
      </button>

      {/* Low stock alerts */}
      {(lowStock.length>0||outOfStock.length>0)&&(
        <div className="card">
          <div className="sec-title">⚠️ Stock Alerts</div>
          {[...outOfStock,...lowStock].slice(0,6).map(p=>(
            <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border2)'}}>
              <div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{p.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{p.category}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <span className={`tag ${p.stock===0?'tag-red':'tag-amber'}`}>{p.stock===0?'OUT OF STOCK':`${p.stock} left`}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Attendant daily report */}
      {(() => {
        const attSales=storeSales.filter(s=>s.date===today()&&s.attendantId);
        if(attSales.length===0)return null;
        const byAtt={};
        attSales.forEach(s=>{if(!byAtt[s.attendantId])byAtt[s.attendantId]={name:s.attendantName||s.attendantId,total:0,count:0,profit:0};byAtt[s.attendantId].total+=s.total;byAtt[s.attendantId].count+=s.items?.length||0;byAtt[s.attendantId].profit+=s.profit;});
        return(
          <div className="card" style={{marginBottom:14,border:'1px solid #6366f133'}}>
            <div className="sec-title" style={{color:'var(--blue)'}}>👤 Attendant Sales Today</div>
            {Object.values(byAtt).map((a,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border2)'}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:1}}>👤 {a.name}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{a.count} item{a.count!==1?'s':''} sold</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'var(--fd)',fontWeight:700,color:'var(--accent)',fontSize:13}}>{fmtMoney(a.total,sym)}</div>
                  <div style={{fontSize:10,color:'var(--green)'}}>+{fmtMoney(a.profit,sym)}</div>
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* Recent sales */}
      <div className="card">
        <div className="sec-title">Recent Sales</div>
        {storeSales.length===0?<div style={{fontSize:12,color:'var(--text3)'}}>No sales recorded yet. Tap "New Sale" to start.</div>
          :storeSales.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6).map(s=>(
            <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border2)'}}>
              <div>
                <div style={{fontWeight:700,fontSize:12,marginBottom:1}}>{s.items?.length||0} item{s.items?.length!==1?'s':''}{s.customer?` — ${s.customer}`:''}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{fmtDate(s.date)}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--fd)',fontWeight:700,color:'var(--accent)',fontSize:13}}>{fmtMoney(s.total,sym)}</div>
                <div style={{fontSize:10,color:'var(--green)'}}>+{fmtMoney(s.profit,sym)}</div>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── PRODUCTS ───────────────────────────────────────────────────
function VProducts({stores,products,setProducts,session,activeStore}){
  const [modal,setModal]=useState(null);
  const [search,setSearch]=useState('');
  const [cat,setCat]=useState('All');
  const sym=getSym(session.currency);

  function save(d){
    setProducts(pp=>d.id?pp.map(p=>p.id===d.id?d:p):[...pp,{...d,id:uid(),storeId:activeStore,createdAt:Date.now()}]);
    setModal(null);
  }
  function del(id){if(!confirm('Delete product?'))return;setProducts(pp=>pp.filter(p=>p.id!==id));}
  function adjustStock(id,delta){
    setProducts(pp=>pp.map(p=>p.id!==id?p:{...p,stock:Math.max(0,p.stock+delta)}));
  }

  const list=products.filter(p=>{
    if(p.storeId!==activeStore)return false;
    if(cat!=='All'&&p.category!==cat)return false;
    if(search&&!p.name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const cats=['All',...new Set(products.filter(p=>p.storeId===activeStore).map(p=>p.category))];

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,gap:8}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--text3)'}}>{list.length} products</div>
        <button className="btn" onClick={()=>setModal({data:null})}>+ Add Product</button>
      </div>
      <div className="search-wrap">
        <span className="search-ico">🔍</span>
        <input className="inp search-inp" placeholder="Search products…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:12,WebkitOverflowScrolling:'touch'}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} style={{padding:'6px 12px',fontSize:11,border:`1px solid ${cat===c?'var(--accent)':'var(--border)'}`,background:cat===c?'#f9731618':'transparent',color:cat===c?'var(--accent)':'var(--text2)',borderRadius:99,cursor:'pointer',fontFamily:'var(--fm)',fontWeight:600,whiteSpace:'nowrap',flexShrink:0}}>
            {c}
          </button>
        ))}
      </div>
      {list.length===0&&<div className="card empty-state"><div className="empty-ico">📦</div><div style={{fontSize:13,letterSpacing:2}}>NO PRODUCTS YET</div><div style={{fontSize:12,marginTop:8}}>Add your first product to start tracking</div></div>}
      <div className="prod-grid">
        {list.map(p=>{
          const pct=p.stock/(p.initialStock||Math.max(p.stock,1))*100;
          const color=p.stock===0?'var(--red)':p.stock<=p.lowStockAlert?'var(--amber)':'var(--green)';
          return(
            <div key={p.id} className="prod-card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{flex:1,marginRight:6}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:2,lineHeight:1.3}}>{p.name}</div>
                  <span className="tag tag-grey">{p.category}</span>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button className="btn-sm" style={{padding:'3px 7px',fontSize:9}} onClick={()=>setModal({data:p})}>✏️</button>
                  <button className="btn-danger" style={{padding:'3px 7px',fontSize:9}} onClick={()=>del(p.id)}>🗑</button>
                </div>
              </div>
              <div style={{marginBottom:8}}>
                <div style={{fontFamily:'var(--fd)',fontSize:15,fontWeight:700,color:'var(--accent)',marginBottom:1}}>{fmtMoney(p.sellPrice,sym)}</div>
                <div style={{fontSize:10,color:'var(--text3)'}}>Cost: {fmtMoney(p.buyPrice,sym)} · Profit: {fmtMoney(p.sellPrice-p.buyPrice,sym)}</div>
              </div>
              <div style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:11,color:'var(--text3)'}}>Stock</span>
                  <span style={{fontSize:12,fontWeight:700,color,fontFamily:'var(--fd)'}}>{p.stock} {p.unit||'pcs'}</span>
                </div>
                <div className="stock-bar"><div className="stock-fill" style={{width:`${Math.min(100,pct)}%`,background:color}}/></div>
              </div>
              <div style={{display:'flex',gap:5,justifyContent:'center'}}>
                <button onClick={()=>adjustStock(p.id,-1)} style={{flex:1,padding:'6px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,color:'var(--red)',cursor:'pointer',fontSize:14,fontWeight:700,touchAction:'manipulation'}}>−</button>
                <button onClick={()=>adjustStock(p.id,1)} style={{flex:1,padding:'6px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,color:'var(--green)',cursor:'pointer',fontSize:14,fontWeight:700}}>+</button>
                <button onClick={()=>setModal({data:{...p,_restock:true}})} style={{flex:1,padding:'6px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,color:'var(--accent)',cursor:'pointer',fontSize:10,fontWeight:700}}>Restock</button>
              </div>
            </div>
          );
        })}
      </div>
      {modal&&<ProductModal data={modal.data} onSave={save} onClose={()=>setModal(null)} sym={sym}/>}
    </div>
  );
}

function ProductModal({data,onSave,onClose,sym}){
  const isRestock=data?._restock;
  const [f,setF]=useState(data&&!isRestock?data:{
    name:'',category:'Food & Drinks',buyPrice:0,sellPrice:0,stock:0,unit:'pcs',lowStockAlert:5,barcode:'',notes:'',initialStock:0
  });
  const [restock,setRestock]=useState(0);
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));
  const profit=f.sellPrice-f.buyPrice;
  const margin=f.sellPrice>0?Math.round(profit/f.sellPrice*100):0;

  function handleSave(){
    if(isRestock){
      const qty=parseInt(restock)||0;
      onSave({...data,stock:data.stock+qty,initialStock:data.stock+qty,_restock:undefined});
    }else{
      if(!f.name.trim())return;
      onSave({...f,initialStock:f.initialStock||f.stock});
    }
  }

  if(isRestock){
    return(
      <div className="modal-ov" onClick={onClose}>
        <div className="modal-box" onClick={e=>e.stopPropagation()}>
          <div className="modal-hdr"><span style={{fontWeight:700}}>Restock — {data.name}</span>
            <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18}} onClick={onClose}>✕</button></div>
          <div className="modal-body">
            <div style={{textAlign:'center',marginBottom:16}}>
              <div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>Current Stock</div>
              <div style={{fontSize:32,fontWeight:800,fontFamily:'var(--fd)',color:'var(--accent)'}}>{data.stock} <span style={{fontSize:14}}>{data.unit||'pcs'}</span></div>
            </div>
            <div className="field"><label className="lbl">Quantity to Add</label>
              <input className="inp" type="number" value={restock||''} onChange={e=>setRestock(e.target.value)} placeholder="0" min="0"/>
            </div>
            {restock>0&&<div className="notice notice-ok">New stock will be: <strong>{parseInt(data.stock)+(parseInt(restock)||0)} {data.unit||'pcs'}</strong></div>}
          </div>
          <div className="modal-foot">
            <button className="btn-outline" onClick={onClose}>Cancel</button>
            <button className="btn" onClick={handleSave} disabled={!restock||restock<=0}>Add Stock</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr"><span style={{fontWeight:700}}>{data?'Edit':'Add'} Product</span>
          <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18}} onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="field"><label className="lbl">Product Name</label><input className="inp" value={f.name} onChange={e=>sv('name',e.target.value)} placeholder="e.g. Milo 400g"/></div>
          <div className="form-grid">
            <div className="field"><label className="lbl">Category</label>
              <select className="sel" value={f.category} onChange={e=>sv('category',e.target.value)}>
                {CATEGORIES.filter(c=>c!=='All').map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="field"><label className="lbl">Unit</label>
              <select className="sel" value={f.unit} onChange={e=>sv('unit',e.target.value)}>
                {['pcs','kg','g','L','mL','box','pack','dozen','bag','roll','bottle','tin','sachet','pair'].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
          </div>
          <div className="form-grid">
            <div className="field"><label className="lbl">Buy Price ({sym})</label><input className="inp" type="number" value={f.buyPrice||''} onChange={e=>sv('buyPrice',parseFloat(e.target.value)||0)} placeholder="0"/></div>
            <div className="field"><label className="lbl">Sell Price ({sym})</label><input className="inp" type="number" value={f.sellPrice||''} onChange={e=>sv('sellPrice',parseFloat(e.target.value)||0)} placeholder="0"/></div>
          </div>
          {f.sellPrice>0&&f.buyPrice>0&&(
            <div className="notice notice-ok" style={{textAlign:'center',marginBottom:12}}>
              Profit: <strong>{fmtMoney(profit,sym)}</strong> · Margin: <strong>{margin}%</strong>
            </div>
          )}
          <div className="form-grid">
            <div className="field"><label className="lbl">Stock Qty</label><input className="inp" type="number" value={f.stock||''} onChange={e=>sv('stock',parseInt(e.target.value)||0)} placeholder="0"/></div>
            <div className="field"><label className="lbl">Low Stock Alert</label><input className="inp" type="number" value={f.lowStockAlert||''} onChange={e=>sv('lowStockAlert',parseInt(e.target.value)||5)} placeholder="5"/></div>
          </div>
          <div className="field"><label className="lbl">Barcode (optional)</label><input className="inp" value={f.barcode||''} onChange={e=>sv('barcode',e.target.value)} placeholder="Scan or type barcode"/></div>
          <div className="field"><label className="lbl">Notes</label><input className="inp" value={f.notes||''} onChange={e=>sv('notes',e.target.value)} placeholder="Any notes…"/></div>
        </div>
        <div className="modal-foot">
          <button className="btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={handleSave} disabled={!f.name.trim()}>Save Product</button>
        </div>
      </div>
    </div>
  );
}

// ── SELL ───────────────────────────────────────────────────────
function VSell({products,setSales,setProducts,session,activeStore,stores,customers}){
  const [cart,setCart]=useState([]);
  const [search,setSearch]=useState('');
  const [customer,setCustomer]=useState('');
  const [payMethod,setPayMethod]=useState('Cash');
  const [done,setDone]=useState(null);
  const sym=getSym(session.currency);
  const storeProds=products.filter(p=>p.storeId===activeStore&&p.stock>0);
  const filtered=storeProds.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.category.toLowerCase().includes(search.toLowerCase()));

  function addToCart(p){
    setCart(c=>{
      const ex=c.find(i=>i.id===p.id);
      if(ex){if(ex.qty>=p.stock)return c;return c.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i);}
      return[...c,{...p,qty:1}];
    });
  }
  function removeFromCart(id){setCart(c=>c.filter(i=>i.id!==id));}
  function changeQty(id,qty){
    const p=products.find(p=>p.id===id);
    if(qty<1||qty>p.stock)return;
    setCart(c=>c.map(i=>i.id===id?{...i,qty}:i));
  }

  const total=cart.reduce((t,i)=>t+i.sellPrice*i.qty,0);
  const profit=cart.reduce((t,i)=>t+(i.sellPrice-i.buyPrice)*i.qty,0);

  function completeSale(){
    if(cart.length===0)return;
    const matchCust=customers?.find(c=>c.name?.toLowerCase()===customer?.toLowerCase()&&c.storeId===activeStore);
    const sale={
      id:uid(),storeId:activeStore,
      items:cart.map(i=>({id:i.id,name:i.name,qty:i.qty,sellPrice:i.sellPrice,buyPrice:i.buyPrice,unit:i.unit})),
      total,profit,customer,customerId:matchCust?.id||null,payMethod,date:today(),createdAt:Date.now()
    };
    setSales(ss=>[...ss,sale]);
    setProducts(pp=>pp.map(p=>{
      const item=cart.find(i=>i.id===p.id);
      return item?{...p,stock:p.stock-item.qty}:p;
    }));
    setDone(sale);setCart([]);setSearch('');setCustomer('');
  }

  function shareReceipt(sale){
    const store=stores.find(s=>s.id===activeStore);
    const txt=buildShareText(sale,store,sym);
    openShareMenu(txt, sale.customer);
  }

  if(done){
    return(
      <div className="fade-in">
        <div className="card" style={{textAlign:'center',border:'1px solid var(--green)',marginBottom:14}}>
          <div style={{fontSize:44,marginBottom:10}}>✅</div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--green)',marginBottom:4}}>Sale Complete!</div>
          <div style={{fontFamily:'var(--fd)',fontSize:24,fontWeight:700,color:'var(--accent)',marginBottom:4}}>{fmtMoney(done.total,sym)}</div>
          <div style={{fontSize:12,color:'var(--green)'}}>Profit: +{fmtMoney(done.profit,sym)}</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <button className="btn-outline" style={{justifyContent:'center',padding:13}} onClick={()=>shareReceipt(done)}>📤 Receipt</button>
          <button className="btn" style={{justifyContent:'center',padding:13}} onClick={()=>setDone(null)}>🛒 New Sale</button>
        </div>
        {/* Sale summary */}
        <div className="card">
          <div className="sec-title">Sale Summary</div>
          {done.items.map((item,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border2)',fontSize:13}}>
              <span>{item.name} × {item.qty}</span>
              <span style={{fontFamily:'var(--fd)',fontWeight:600}}>{fmtMoney(item.sellPrice*item.qty,sym)}</span>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',padding:'10px 0',fontWeight:800,fontSize:15}}>
            <span>Total</span><span style={{color:'var(--accent)',fontFamily:'var(--fd)'}}>{fmtMoney(done.total,sym)}</span>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div>
      {/* Cart */}
      {cart.length>0&&(
        <div className="card" style={{border:'1px solid var(--accent)',marginBottom:14}}>
          <div className="sec-title" style={{color:'var(--accent)'}}>🛒 Cart ({cart.length} item{cart.length!==1?'s':''})</div>
          {cart.map(item=>(
            <div key={item.id} className="sale-item">
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{item.name}</div>
                <div style={{fontSize:12,color:'var(--text3)'}}>{fmtMoney(item.sellPrice,sym)} each</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <button onClick={()=>changeQty(item.id,item.qty-1)} style={{width:28,height:28,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,color:'var(--red)',cursor:'pointer',fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                <span style={{fontFamily:'var(--fd)',fontWeight:700,minWidth:24,textAlign:'center'}}>{item.qty}</span>
                <button onClick={()=>changeQty(item.id,item.qty+1)} style={{width:28,height:28,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5,color:'var(--green)',cursor:'pointer',fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                <span style={{fontFamily:'var(--fd)',fontSize:13,fontWeight:700,minWidth:70,textAlign:'right',color:'var(--accent)'}}>{fmtMoney(item.sellPrice*item.qty,sym)}</span>
                <button onClick={()=>removeFromCart(item.id)} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:16,padding:'0 4px'}}>✕</button>
              </div>
            </div>
          ))}
          <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:8}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontWeight:800,fontSize:15}}>Total</span>
              <span style={{fontFamily:'var(--fd)',fontWeight:800,fontSize:17,color:'var(--accent)'}}>{fmtMoney(total,sym)}</span>
            </div>
            <div style={{fontSize:11,color:'var(--green)',textAlign:'right',marginBottom:12}}>Profit: +{fmtMoney(profit,sym)}</div>
            <div className="form-grid" style={{marginBottom:10}}>
              <div><label className="lbl">Customer</label>
                <input className="inp" list="cust-list" value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="Type or select customer"/>
                <datalist id="cust-list">{(customers||[]).filter(c=>c.storeId===activeStore).map(c=><option key={c.id} value={c.name}>{c.name} — {c.phone}</option>)}</datalist>
              </div>
              <div><label className="lbl">Payment</label>
                <select className="sel" value={payMethod} onChange={e=>setPayMethod(e.target.value)}>
                  {['Cash','MoMo','Card','Credit','Bank Transfer'].map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
            </div>
            <button className="btn-green" style={{width:'100%',justifyContent:'center',padding:14,fontSize:14}} onClick={completeSale}>
              ✅ Complete Sale — {fmtMoney(total,sym)}
            </button>
          </div>
        </div>
      )}

      {/* Product search */}
      <div className="search-wrap">
        <span className="search-ico">🔍</span>
        <input className="inp search-inp" placeholder="Search product to add…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {storeProds.length===0&&<div className="card empty-state"><div className="empty-ico">📦</div><div style={{fontSize:13,letterSpacing:2}}>NO PRODUCTS IN STOCK</div><div style={{fontSize:12,marginTop:8}}>Add products first before making a sale</div></div>}

      <div className="prod-grid">
        {filtered.map(p=>{
          const inCart=cart.find(i=>i.id===p.id);
          return(
            <div key={p.id} className="prod-card" style={{cursor:'pointer',border:inCart?'1px solid var(--accent)':'1px solid var(--border)'}} onClick={()=>addToCart(p)}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:4,lineHeight:1.3}}>{p.name}</div>
              <span className="tag tag-grey" style={{marginBottom:8,display:'inline-flex'}}>{p.category}</span>
              <div style={{fontFamily:'var(--fd)',fontSize:16,fontWeight:700,color:'var(--accent)',marginBottom:4}}>{fmtMoney(p.sellPrice,sym)}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Stock: {p.stock} {p.unit||'pcs'}</div>
              {inCart&&<div className="notice notice-orange" style={{padding:'4px 8px',fontSize:11,textAlign:'center',margin:0}}>In cart: {inCart.qty}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SALES HISTORY ──────────────────────────────────────────────
function VSalesHistory({sales,products,session,setSales,activeStore,stores,customers}){
  const [search,setSearch]=useState('');
  const [dateFilter,setDateFilter]=useState('month');
  const [selMonth,setSelMonth]=useState(new Date().getMonth());
  const [selYear,setSelYear]=useState(new Date().getFullYear());
  const [invoiceModal,setInvoiceModal]=useState(null);
  const sym=getSym(session.currency);

  const now=new Date();
  // Build year list from all sales
  const saleYears=[...new Set(sales.filter(s=>s.storeId===activeStore).map(s=>new Date(s.date||s.createdAt).getFullYear()))];
  if(!saleYears.includes(now.getFullYear()))saleYears.push(now.getFullYear());
  saleYears.sort((a,b)=>b-a);

  const list=sales.filter(s=>{
    if(s.storeId!==activeStore)return false;
    if(search&&!s.customer?.toLowerCase().includes(search.toLowerCase())&&!s.items?.some(i=>i.name?.toLowerCase().includes(search.toLowerCase())))return false;
    if(dateFilter==='today'&&s.date!==today())return false;
    if(dateFilter==='week'){const d=new Date(s.date);const w=new Date();w.setDate(w.getDate()-7);if(d<w)return false;}
    if(dateFilter==='month'){const d=new Date(s.date||s.createdAt);if(d.getMonth()!==selMonth||d.getFullYear()!==selYear)return false;}
    return true;
  }).sort((a,b)=>new Date(b.createdAt||b.date)-new Date(a.createdAt||a.date));

  const totalRev=list.reduce((t,s)=>t+s.total,0);
  const totalProfit=list.reduce((t,s)=>t+s.profit,0);

  function delSale(id){
    if(!confirm('Delete this sale?'))return;
    setSales(ss=>ss.filter(s=>s.id!==id));
  }
  function shareReceipt(s){
    const store=stores.find(st=>st.id===activeStore);
    const txt=buildShareText(s,store,sym);
    const cust=customers?.find(c=>c.id===s.customerId);
    openShareMenu(txt, s.customer, cust?.phone, cust?.email);
  }

  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
        <div className="stat-card"><div className="stat-label">Revenue</div><div className="stat-val" style={{fontSize:16,color:'var(--accent)'}}>{fmtMoney(totalRev,sym)}</div></div>
        <div className="stat-card"><div className="stat-label">Profit</div><div className="stat-val" style={{fontSize:16,color:'var(--green)'}}>{fmtMoney(totalProfit,sym)}</div></div>
      </div>
      <div className="rtabs">
        {[['all','All'],['today','Today'],['week','Week'],['month','Month']].map(([id,l])=>(
          <button key={id} className={`rtab${dateFilter===id?' active':''}`} onClick={()=>setDateFilter(id)}>{l}</button>
        ))}
      </div>
      {dateFilter==='month'&&(
        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
          <select className="sel" style={{flex:2}} value={selMonth} onChange={e=>setSelMonth(parseInt(e.target.value))}>
            {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
          </select>
          <select className="sel" style={{flex:1}} value={selYear} onChange={e=>setSelYear(parseInt(e.target.value))}>
            {saleYears.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
      )}
      <div className="search-wrap">
        <span className="search-ico">🔍</span>
        <input className="inp search-inp" placeholder="Search customer…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      {list.length===0&&<div className="card empty-state"><div className="empty-ico">🧾</div><div style={{fontSize:13,letterSpacing:2}}>NO SALES FOUND</div></div>}
      {list.map(s=>(
        <div key={s.id} className="card" style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{s.items?.length||0} item{s.items?.length!==1?'s':''}{s.customer?` — ${s.customer}`:''}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>{fmtDate(s.date)} · {s.payMethod}</div>
              {s.items?.slice(0,2).map((item,i)=>(
                <div key={i} style={{fontSize:11,color:'var(--text2)'}}>{item.name} ×{item.qty}</div>
              ))}
              {s.items?.length>2&&<div style={{fontSize:10,color:'var(--text3)'}}>+{s.items.length-2} more…</div>}
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:15,color:'var(--accent)',marginBottom:3}}>{fmtMoney(s.total,sym)}</div>
              <div style={{fontSize:10,color:'var(--green)',marginBottom:8}}>+{fmtMoney(s.profit,sym)}</div>
              <div style={{display:'flex',gap:5,justifyContent:'flex-end',flexWrap:'wrap'}}>
                <button className="btn-sm" style={{fontSize:9}} onClick={()=>shareReceipt(s)}>📤 Share</button>
                <button className="btn-blue" style={{fontSize:9}} onClick={()=>setInvoiceModal(s)}>📄 Invoice</button>
                <button className="btn-danger" style={{fontSize:9}} onClick={()=>delSale(s.id)}>🗑</button>
              </div>
            </div>
          </div>
        </div>
      ))}
      {invoiceModal&&<InvoiceModal sale={invoiceModal} customers={customers||[]} stores={stores} session={session} onClose={()=>setInvoiceModal(null)}/>}
    </div>
  );
}

// ── REPORTS ───────────────────────────────────────────────────
function VReports({sales,products,session,activeStore}){
  const [yr,setYr]=useState(new Date().getFullYear().toString());
  const sym=getSym(session.currency);
  const storeSales=sales.filter(s=>s.storeId===activeStore);
  const storeProds=products.filter(p=>p.storeId===activeStore);
  const ySales=storeSales.filter(s=>new Date(s.date).getFullYear().toString()===yr);
  const yRev=ySales.reduce((t,s)=>t+s.total,0);
  const yProfit=ySales.reduce((t,s)=>t+s.profit,0);
  const monthly=MONTHS.map((m,i)=>{const ms=ySales.filter(s=>new Date(s.date).getMonth()===i);return{m,rev:ms.reduce((t,s)=>t+s.total,0),profit:ms.reduce((t,s)=>t+s.profit,0),count:ms.length};});
  const maxRev=Math.max(...monthly.map(m=>m.rev),1);

  // Best sellers
  const itemCounts={};

  const topItems=Object.values(itemCounts).sort((a,b)=>b.qty-a.qty).slice(0,5);
  const totalStockValue=storeProds.reduce((t,p)=>t+(p.buyPrice*p.stock),0);
  const totalRetailValue=storeProds.reduce((t,p)=>t+(p.sellPrice*p.stock),0);

  // year list from all sales

  return(

        {allYears.length>1&&(
          <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
            {allYears.map(y=>(
              <button key={y} onClick={()=>setYr(y)} style={{padding:'4px 12px',borderRadius:20,border:`1px solid ${yr===y?'var(--accent)':'var(--border)'}`,background:yr===y?'#f9731622':'transparent',color:yr===y?'var(--accent)':'var(--text3)',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'var(--fm)',minHeight:32}}>{y}</button>
            ))}
          </div>
        )}
      </div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Year Revenue</div><div className="stat-val" style={{fontSize:15,color:'var(--accent)'}}>{fmtMoney(yRev,sym)}</div></div>
        <div className="stat-card"><div className="stat-label">Year Profit</div><div className="stat-val" style={{fontSize:15,color:'var(--green)'}}>{fmtMoney(yProfit,sym)}</div></div>
        <div className="stat-card"><div className="stat-label">Stock Value</div><div className="stat-val" style={{fontSize:15}}>{fmtMoney(totalStockValue,sym)}</div><div className="stat-sub">cost price</div></div>
        <div className="stat-card"><div className="stat-label">Retail Value</div><div className="stat-val" style={{fontSize:15}}>{fmtMoney(totalRetailValue,sym)}</div><div className="stat-sub">if all sold</div></div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div className="sec-title" style={{margin:0}}>Monthly Revenue — {yr}</div>
        </div>
        {monthly.map(({m,rev,profit,count},mi)=>(
          <div key={m} style={{marginBottom:10,cursor:'pointer',borderRadius:6,padding:'2px 0'}} onClick={()=>{
            const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            alert(m+' '+yr+'\n\nRevenue: '+fmtMoney(rev,sym)+'\nProfit: '+fmtMoney(profit,sym)+'\nTransactions: '+count);
          }}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:12,color:'var(--text2)',minWidth:32}}>{m}</span>
              <span style={{fontSize:11,color:'var(--text3)'}}>{count} sales</span>
              <span style={{fontSize:12,fontWeight:700,color:rev>0?'var(--accent)':'var(--text3)',fontFamily:'var(--fd)',minWidth:90,textAlign:'right'}}>{rev>0?fmtMoney(rev,sym):'—'}</span>
            </div>
            <div style={{height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',background:'var(--accent)',width:`${rev/maxRev*100}%`,borderRadius:3,transition:'width .4s'}}/>
            </div>
          </div>
        ))}
      </div>
      {/* Live Stock Level Chart */}
      <div className="card" style={{marginBottom:14}}>
        <div className="sec-title">📊 Stock Levels — Live</div>
        {storeProds.length===0?<div style={{fontSize:12,color:'var(--text3)'}}>No products yet.</div>
          :storeProds.slice().sort((a,b)=>{
            const pctA=a.stock/(a.initialStock||Math.max(a.stock,1));
            const pctB=b.stock/(b.initialStock||Math.max(b.stock,1));
            return pctA-pctB;
          }).map(p=>{
            const maxStock=p.initialStock||Math.max(p.stock,p.lowStockAlert*2,1);
            const pct=Math.min(100,Math.round(p.stock/maxStock*100));
            const color=p.stock===0?'var(--red)':p.stock<=p.lowStockAlert?'var(--amber)':'var(--green)';
            const status=p.stock===0?'OUT':'LOW';
            return(
              <div key={p.id} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontWeight:700,fontSize:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'block'}}>{p.name}</span>
                    <span style={{fontSize:10,color:'var(--text3)'}}>{p.category}</span>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0,marginLeft:10}}>
                    <span style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:13,color}}>{p.stock} <span style={{fontSize:10,fontWeight:400,color:'var(--text3)'}}>{p.unit||'pcs'}</span></span>
                    {(p.stock===0||p.stock<=p.lowStockAlert)&&<span className={`tag ${p.stock===0?'tag-red':'tag-amber'}`} style={{marginLeft:6,fontSize:8}}>{status}</span>}
                  </div>
                </div>
                <div style={{height:10,background:'var(--border)',borderRadius:5,overflow:'hidden',position:'relative'}}>
                  <div style={{
                    height:'100%',borderRadius:5,
                    width:`${pct}%`,
                    background:p.stock===0?'var(--red)':pct<=25?'var(--red)':pct<=50?'var(--amber)':'var(--green)',
                    transition:'width 0.8s cubic-bezier(0.4,0,0.2,1)',
                    boxShadow:p.stock>0?`0 0 8px ${color}88`:'none',
                    position:'relative',
                    animation:p.stock>0&&pct<=25?'pulse 2s infinite':'none',
                  }}/>
                  {pct>8&&<span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:7,fontFamily:'var(--fd)',fontWeight:700,color:'#0a0a0f',lineHeight:1}}>{pct}%</span>}
                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                  <span style={{fontSize:9,color:'var(--text3)'}}>0</span>
                  <span style={{fontSize:9,color:'var(--text3)'}}>Alert: {p.lowStockAlert}</span>
                  <span style={{fontSize:9,color:'var(--text3)'}}>Max: {maxStock}</span>
                </div>
              </div>
            );
          })
        }
      </div>

      {/* Month detail breakdown */}
      <div className="card" style={{marginBottom:14}}>
        <div className="sec-title">📋 Month-by-Month Breakdown — {yr}</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{borderBottom:'2px solid var(--border)'}}>
                {['Month','Sales','Revenue','Profit','Margin'].map(h=><th key={h} style={{padding:'6px 8px',textAlign:'left',fontSize:9,letterSpacing:2,color:'var(--text3)',fontWeight:700,whiteSpace:'nowrap'}}>{h}</th>)}
              </tr>
            </thead>
            <tbody>
              {monthly.map(({m,rev,profit,count})=>{
                const margin=rev>0?((profit/rev)*100).toFixed(1):0;
                const isCurrentMonth=m===MONTHS[new Date().getMonth()]&&yr===new Date().getFullYear().toString();
                return(
                  <tr key={m} style={{borderBottom:'1px solid var(--border2)',background:isCurrentMonth?'#f9731608':'transparent'}}>
                    <td style={{padding:'8px',fontWeight:isCurrentMonth?700:400,color:isCurrentMonth?'var(--accent)':'var(--text)'}}>{m}{isCurrentMonth?' ●':''}</td>
                    <td style={{padding:'8px',fontFamily:'var(--fd)',color:count>0?'var(--text)':'var(--text3)'}}>{count}</td>
                    <td style={{padding:'8px',fontFamily:'var(--fd)',color:'var(--accent)',fontWeight:600}}>{rev>0?fmtMoney(rev,sym):'—'}</td>
                    <td style={{padding:'8px',fontFamily:'var(--fd)',color:'var(--green)'}}>{profit>0?fmtMoney(profit,sym):'—'}</td>
                    <td style={{padding:'8px',color:parseFloat(margin)>20?'var(--green)':parseFloat(margin)>0?'var(--amber)':'var(--text3)'}}>{rev>0?margin+'%':'—'}</td>
                  </tr>
                );
              })}
              <tr style={{borderTop:'2px solid var(--border)',fontWeight:800}}>
                <td style={{padding:'10px 8px',color:'var(--text)'}}>TOTAL</td>
                <td style={{padding:'10px 8px',fontFamily:'var(--fd)'}}>{ySales.length}</td>
                <td style={{padding:'10px 8px',fontFamily:'var(--fd)',color:'var(--accent)'}}>{fmtMoney(yRev,sym)}</td>
                <td style={{padding:'10px 8px',fontFamily:'var(--fd)',color:'var(--green)'}}>{fmtMoney(yProfit,sym)}</td>
                <td style={{padding:'10px 8px',color:'var(--text)'}}>{yRev>0?((yProfit/yRev)*100).toFixed(1)+'%':'—'}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="sec-title">🏆 Best Sellers</div>
        {topItems.length===0?<div style={{fontSize:12,color:'var(--text3)'}}>No sales data yet.</div>
          :topItems.map((item,i)=>(
            <div key={item.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border2)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
